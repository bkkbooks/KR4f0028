body:
  text: 抱犢山房集卷二錫山嵇永仁撰詩百苦吟并引昔人有言蟲生蓼中胞胎悉苦余輩讀聖賢書學經濟事不能輝煌騰達自行胸臆依附得志者以行其道此亦無聊之極思矣乃復顛危窮迫逼處幽羈身體髮膚空乏凍餓心志筋骨勞苦熬煎豈天將有意大降之任耶抑人處憂患之地而後善心生耶茫茫彼蒼莫能窮詰硜硜一介無惡可為意者我生不辰適逢其㑹歟然運數劫火仙佛唾餘悠悠庸妄無可奈何援此諉之於命而主持世道者不敢涉也公詩曰誤國愧虛名余每讀此低回者久之仁人君子之用心誠不因艱難險阻而輟其痌瘝悲憫之素志也春來筆墨久廢回憶兩年親厯諸景啞然而笑漫然為之遂成百首用炭屑圖於四壁蓼蟲自語其苦夫復何異同難二三子應聲而和真情實境不假思索吟者撚鬚未斷讀者觸心即酸聊作患難圖繪可也三家村老撲棗打油尚且流傳閭巷士女謳歌矧余輩之羽翼忠孝砥礪名節者哉故於詩成而系之以引抱犢山農識颶風海國年年起大風於今風勢撼蛟宫瓦飛木拔人摧仆驚起羈魂碧落中瘴雨蠻煙毒霧雨傾盆濕盡炊煙火不存絶食淋漓拚禁錮何須行乞學王孫積潦水深三尺釡生萊人在圜中水氣埋野鶩如何飛不起波濤平地最堪哀炎蒸解愠南風未可期爍膚如火烈風吹炎方豈乏清凉散煩惱場中扇不宜凍雪六尺飛花是瑞胎三山盈尺作凶猜連年亂灑鵝毛片僵煞袁安做一堆連隂積霧沉霾深閉扄窺天不放一痕青無端盆覆竒男子愁鎖長空日氣冥黴濕乍晴乍雨熟梅天江北江南氣候連獨有海隅時序改四時蒸透破青氊泥濘閩俗風光著屐紅不教誤踏在泥中餘生汨汨泥塗內何日登山倚謝公昏黑惱人無賴值黃昏黯黯愁雲易斷魂晚照桑榆還在目衡門此際逐雞豚昧旦每到雞鳴睡不安五更心事半生難起來怕見狰獰靣一枕天涯夢已殘瞭燈半明半滅影蒼黃照盡單衾瘦貼牆一卷維摩猶在手直疑禪舍佛慈光屋漏滴滴牀頭似淚懸和泥和水浸衣穿平生爾室原無愧不透天邊透雨邊濕地避乾就濕似僵魂枕石終宵氣不溫左臂至今成痛痺天留右腕筆空存負暄幾時曝背向蓉莊别去頻年荆棘長凍結鬚眉同北地南邊如此盼朝陽旱澡探湯未熟貯烏盆勺水人多攪易渾去垢未曾偏惹垢羡他江漢濯冰魂蓬首短髮和愁共作絲鏡中搔首嘆迷離憑誰櫛沐添憔悴結髮春閨知不知㻈靣神瘁形枯霜雪還行年四十笑頽顔何妨靣目䝉塵土自有光明照世間攣手誰云醫國補天工盡在凄凉袖手中總怕丹成飛欲去仙人掌上受牢籠縶足踏透層冰不怕寒如何寸步一身難却緣愛把滄浪濯留與風波局內看拘頂木吏無言虎踞憑相看頑鐵骨模稜書生不是鴛鴦頸空向星前扣赤繩枯腸左圖右史校讐年鄴架名山浩若煙此日著書無半部腹空搜索愧便便淚眼吞聲飲恨不曾乾漸覺糢糊眼力酸縱有雲山難極望管中偷把上天看聞柝閙煞沿門十甲牌柝聲敲斷喚巡街馬蹄猶自頻頻過攪亂雲山徹夜懷聽砧年年不見有寒衣刀尺聲中嵗月非戍婦至今猶若此江南淚濕竇家機鄰哭白骨如山卧戰場塵羮土飯悼新亡近來巷哭多如許只為清明到北邙風鶴難裏如絲性命微驚傳消息是耶非如豫聽慣齊東語鷗鳥真忘禍福機炮警捲地奔雷響徹天危城氣勢觸蠻煙縱教掩耳偷餘息鼠穴驚魂已兩年觱栗城上嗚嗚畫角聲秋殘春老總傷情千家按籍丁男數一月三回聽㸃兵鼙鼓馬上鼕鼕道路悲裲襠拂袖助鐃吹商聲奏入軍中樂只合漁陽奮幾槌笳吹蘆管吹來日氣寒邊軍回首望長安海邦也為防邊設地北天南恨一般吏稽小吏停軒罪籍呈乾坤無罪此身輕令嚴日日來稽察認作秋闈夜唱名卒獰木客山魈結一羣經年耳目鬼紛紜圖將五嶽誰攜佩白澤空中自護君晝詰圜牆黑霧罩通衢多少行人悲向隅念舊小奚來訊主毒拳批頰血糢糊夜查傍晚催人鎖鑰間琅琅震耳套連環龍鍾不似神蛟怒空費機心鐵樹關值班一波一浪送危帆閲盡潮頭踞石巖變態咆哮千百種直如燕子語呢喃交更暮鼓晨梆日夜嘈挨時記刻較分毫關情不似巡更雁漏盡鐘鳴枉自勞臭蟲破柱頽垣黑夜游蘭襟臭味不相投圓圓赤暈浮如粟噬盡頑肌當石頭蟣蝨王猛雄談定霸圖懷中捫出只些須誰教肉相非王佐只合供他飽餓夫飛蠅豫耳常苦夜蠅飛入讒言罔極怪青蠅蒙垢生平觸類憎充耳至今聽否慣飛來掠去有何能遊鼠鼠曾咬豫足指隂房日夜走鼷鼯糞土牀前傾食盂荼味不堪供大嚼致教蹂踐到寒軀聚蚊炎鄉瘴海聚成雷毒口趨時撲又來巾幗鬚眉筋尚露丈夫體徑不須哀鬼啾盡道隂房鬼火森啾啾叫徹五更心欲求雪痛招魂賦我正羈囚痛更深疫癘錯亂隂陽氣候乖網羅百口似枯荄霜飛六月知天意傳染如何雪上埋碎衣衣裳薜荔未為貧百結懸鶉耐幾春磨盡生平窮骨健傲他裘馬少年人破被買就零星敗絮來遮身此夜凍初回黑甜鄉裏還家夢不信天涯作死灰砂鍋甑破何勞顧盼為搏泥鑽火亦成炊庖犧五味從中别甘苦心脾只自知泥罏焚檀炙桂夢徒然爇盡寒灰榾柮煙七十老翁愁足冷三冬夜夜傍他眠瓦盆盂水盤飱野老風虀鹽啖盡有時空雖然易破猶能買留作堯衢鼓缶翁草褥肌骨相侵冰鐵痕芙蓉溫軟不須論印沙倣佛銜蘆雁偎藉郊原草幾根敝履厯盡艱難烽火驕三千里外寄蹤遙芒鞋踏破圜扉窟畫地空思圮上橋木枕削木如拳卧不安驚心何夢到邯鄲曲肱雖是儒風味拋却南窗此地難篾筐蟻攢鼠耗攪塵羮食息需人為掃清賴得竹籮容納便行厨只此挈提輕竹刀滅鏑銷鋒傳檄嚴手無寸鐵試虀鹽雖然浪擲庖丁手抹煞鉛刀削竹籖草珠山妻囑付早潛修一串牟尼臂上留難裏衣珠拋失去菩提草粒費搜求油箑團扇流螢撲幾星冰肌無汗舊園亭年來溽暑蒸人劇一握芭蕉手未經惡紙萬緒千愁訴不成傳心端藉楮先生裁箋零落無雲母刻劃篇章消幾籯臭墨殘瀋如雲碧作藍鮑魚過肆味中含松煙半鋌能多許薰透文心命不甘敗筆管城觸處破愁城吐墨吞毫百萬兵掃盡鋒鋩猶勝劒誅心斧鉞掌中擎磚硯端溪鸜鵒眼朦朧信手磨磚骨易鎔莫謂此田耕不得秋成應報舊山農殘書余過嶺時有書一擔今盡失之擾攘中矣童子偶拾得數本見故物為之凄然斷簡殘編走蠧魚零星收得當竒書可憐草載鈔千帙半付家藏半亂餘炭痕初被繫時禁絶楮墨得句以炭畫牆得句何嘗不淚垂更兼淚漬手中揮倩人堊掃勞多少清白流傳幾首詩塵灰臘月鄉風盡掃塵懸竿縛帚屋梁新兩年度歲仍依舊不見磨光刮垢人煙眯丈地泥爐處處燃霧中七里欲遮天炫人五色元黃戰只道山柴數縷煙乞水汲綆求人渴欲烹轆轤金井逺無聲問余家在名泉邑何事虛拋抱甕情覓火雪浪銀濤邊海城炎炎赤地祖龍坑此間偏乏桑榆火借取鄰煙煮菜羮摘菜剔盡根鬚洗盡泥煮來鹽味便成虀飢腸藜藿都相習心手艱勞不用提執爨析薪炊火度時艱童子呼來鈍且頑不若親身猶省力寒暄冷暖各相關食淡海國煎鹽價萬尋持籌恨不變黃金一文羞澀無從買淡飯春來剩苦吟縫綻針線臨岐慈母心誰知破碎到於今未曾乞得天孫巧偷學縫裳免捉襟浣衣垢膩成團濯者誰一身兼僕更何辭鯫生齷齪心中少不藉除煩清淨池滌器潦倒慚無犢鼻褌飯餘滌器到牆根拋殘剩汁皆愁味若有文君慘斷魂粉粥裹腹從軍諸葛糧難途舂粉療飢腸依稀退院山僧粥豆麥成糜木碗香餕宋木飯義重難為接淅行半盂土飯亦何爭嘗來氣味非疇昔難買香從早稻生栁茶竹爐煙裏想山家蟹眼烹來榖雨芽一自掉船灘溜外焙成栁葉當新茶劣酒杯中斷絶一年無病裏拘牽筋脈枯欲博微酣沽市上酸漿贏得滿匏壺缺藥藥碗參苓夢亦虛買來都是草根餘先生莫道盧扁手嘗然神農味不如書傭翁啾婦唧作家書道是參軍飽蠧魚月月供他閒紙筆平安兩字漫躊躇醫匠口傳病態索醫方虛實難憑氣脈詳總是活人心術在暗中調劑合岐黃蔽席朔風暗襲土牆頭折葦牽蘿禦冷謀孺子柴門遮片席不須更為杞人憂篐桶黑漆先生桶破來何勞劈竹作胚胎祗緣要佐瓶罍用肯逐人間廢棄材糞草掃來積垢又成堆總似閒愁撥不開惟羡焚香郭有道清風過處少莓苔穢厠萬石家風滌厠勤顛危濁氣觸妖氛客卿奇辱身投溷似此何妨捉鼻薰溺器交臂聨牀水火情撲人溲氣逼檐楹君非沛上真龍種頭戴儒冠溺不成惡夢一枕荒唐意奈何樵歌牧唱境蹉跎兒家穩踞風波渡喚醒全憑春夢婆元旦天時人意想陽春剛到春來笑此身滿地煙塵昏黑裏不堪重問嵗華新清明昨日禁煙風雨聲今朝霽色屬清明南冠有客離鄉井空憶家中插栁人至日鐵骨寒梅待雪開朔風六管正飛灰老親白髮雲天外長憶兒曹去未回除夜慟哭誰憐阮籍窮空將壯志負桑蓬孤燈此夕更籌永腸斷東風聽曉鴻撫棺百計偷生君未能我偏求死死何曾君今先逝魂歸國死後寒儒尚履冰客俘繫去牽來盡楚冠向隅飲泣各心酸其間獨有風僧好笑把圜扉福地安時華林風僧亦被繫老親斑衣辜負著囚衣白髮親恩報答微未敢許人身固重孤臣寂寞忍言歸昆弟秣陵泛宅錫山家一本枝開棠棣花姜被寒溫誰與共誤人多難滯天涯憶內抱犢田間夜辟纑於陵偕隱盼征夫堂前怕說南方事腸斷三年侍舅姑思兒夢到離家淚欲零大兒五嵗次三齡解余手未停批㸃曾學攜書到父庭同宗立命堂中督課嚴讀書心逺地沈潛清修南渡司徒裔對策多竒愛孝廉立命堂謂淑子兄心逺堂謂盤石先伯余皆課業其中孝廉謂羽斯弟也受業招攜琴劒别姑蘇恐類名場詩酒徒膏火幾年依别業釣魚臺畔學為儒銓部張鞠存夫子見余落拓吳門攜至東溪令下帷數載耳提靣命成就余學同社培園燈火浦雲深江左垂髫便入林吳㑹羣英名久著梁溪獨繫野鷗心培園謂張岵思雲子劉膚士諸子公路浦謂盧春卿簿其南孫容斯諸子江左謂王惟夏吳何仲程虎文侶匏諸子吳㑹謂蔣曠生傅龍翰申詔生諸子梁溪謂嚴蓀友秦樂天鄒立三呂香令諸子故恩白門太史作文翁席上重裘解覆躬更有濓溪淝水老知希為我哭途窮白門太史程翼倉夫子出為廣文時新安富人以譜誼來介壽開筵觴之皆戴貂衣狐獨余單衫橫踞首席不勝其寒更酌犀觥來勸余量窄故作豪飲狀嘔吐狼藉客喧笑余瞋目大呼曰笑某吐酒則可笑寒則不可夫子急呵止之親解重裘衣我淝水周夫子來為廣文年已七十稔余之窮招而同牀抵足晝則買肉供我或偶他出則持肉食親置厨中待余下箸始愜意時考校余以首當補餼例有雜費始具牒上呈余不能措欲他避胥役恐首名不補則誤其後補者羣而逼余周夫子以頭觸諸胥開篋出十餘金付之始解夫子每至夜披衣而起喚余談遇合之難輒為余淚下今兩夫子皆作古人余無以報德悲夫舊遊巖壑逢迎到㑹稽傖塘花竹最凄迷溫陵煙雨嚴灘月到處張帆聽鳥啼少時同羅周師讀書㑹稽之傖塘束髮知心惟此一人羅子由中翰出為佐郡余且沈淪為難人矣叔子兄司李溫陵爾遐兄司李嚴陵余皆讀書於其署中故及之祭墩頑然塊木本無靈相伴文章奎壁星謝爾忘懷從不語一杯灑泣奠椒馨告神灑筆成文念頌髙獄中神主問臯陶盛朝刑賞天威在莫使看為辨上髦抱犢山房集卷二
