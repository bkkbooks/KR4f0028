body:
  text: 抱犢山房集巻五錫山嵇永仁撰雜文通濟橋記金華通逺門外距城一里為通濟橋舊址壞於兵火修則無基建則費詘每遇霖潦暴發溪湧山髙渡者目駭耳回䕫魖坐水底待人而食人多死之或曰鬼實禍焉守憲胡公始至思所以洗民患者獨力未易支也乃捐金倡募合僚屬紳士商販所輸可得萬緡遂精簡亷幹經營相度伐木於龍游鑿石於遂安遴匠鳩工築基肇址時苦春漲人力難施公望洋而嘆俄而風翻水怒如有神物排銀濤而驅雪浪一時水涸見底徒衆踴躍用命為立石墩墩成復大雨滂沱水汪洋而盈者如前其所採買山木皆得順流直下若或航之是一涸一盈適遭其㑹人心勸而天事宜也往者造橋之役誅求大户督責富商苛派里夫伐傷墳樹生者不寧死者失所以故經年不成經數年不成雖或成之經數十年輒敗皆蓄怨積怒之所歸也豈能久哉公獨不然輸者奬否者聽力役者給之米薪故其成易易也方橋垂成時有老人夜聞鬼語曰工竣矣若輩無安身所奈何應者曰俟諸来日如是啾啾者久而始散老人心惑之次日渡者六十餘人老人亦附舟俄觸夜来所聞倉皇登岸不敢渡是日天氣晴風亦恬正渡未半湍激回猋風濤迅發須㬰舟如敗葉倒景蔽天渡者號哭之聲殷殷雷砰岸人刺船往救而篙如萬石弩不可動人謂鬼力所憑而人舟已沈没矣觀者舌橋口張嘆息而已因相與酬酒奠之曰使公早来安有此患它日橋成吾儕又安復有此患乎於是樂施者甚多効力者愈猛閱三月而告成工始知人定勝天鬼終不能為禍也已而予用有歎也孫樵曰樵嘗為褒城驛記恨所在長吏不肯出毫力以利民及覩滎陽公以開新江受譴豈立事者亦未易今幸胡公肯出力利民而不裒於民又樂婺民馴呐與公相信不至如滎陽公喋喋教令日白其意於郪民且喜徭役尚省得便宜舉行既不能病民亦不能為官憂三月落成無事聞之大府與劾之有司也是均不可無記雖然橋成而記之民意也非公意也七竹軒記東陽署之右偏為余授書所庭有隙地半畝種竹六竿余顔其軒曰七竹以余故也竹固樂得余為友而増其一也然而此君之不宜於世也久矣其心空其節勁其質古其色蒼然而秀空者無物勁者自強古則守樸不競蒼然而秀則磊落自好是吾儕不可一日少即流俗不可一日多也余也其敢望乎空山之中多紛紅駭綠之品幽素者弗尚也塵埃之内有凌霄蔽日之姿軟媚者弗樂也我所棄或為人所取我所取或為人所棄是故此君幸而遇余不至鋤而去焉而又與之為伍投分結契歴暑踰寒彼既不孤此亦得偶其不幸而余去也則此軒空存安保後之人有顧名思義者乎於是作記告之曰凡入此室處者幸善遇我同類蔬枰記宋子抱幽憂之疾不樂仕於時退隠射陽之濱自號耕海潛夫名其圃曰蔬枰余謂蔬者治生之細務枰者造物之爭端何取諸宋子曰人病無事耳有入世之事即有避世之事避世者耦耕荷蓧荷蕢之類是也余生而衰孱不任力作寤而蕤蕤寐而魚魚一切勤苦煩毒之事弗舉於趾而累於手者久矣然獨愛種植出也抱甕入也灌園不知其志之劬而力之憊也余有老母春秋頗髙老人健忘余種菖蒲以益其聰老人多思慮余種萱草以忘其憂老人氣不足余種申椒以延其年老人愛哺孫余種棗栗以佐其飴老人厭淡薄余種葵種薺以甘滑其味至於𤓰瓠苴荼則與山妻稚子以為常食是亦可以終其身乎若夫人世之變幻倐忽千百萬億固有不忍言者其形容怪誕如鬼魅其肺肝酷慘如刀劒其言語反覆牴牾支離轇轕呶呶不可聽其朝而駢肩暮而掉臂陽敦玉帛隂擠下石之情狀如山谷江河之險阻而洶湧此其勢如枰然黑白紛紜勝敗倐忽角智鬬能忿爭莫解詩曰憂心奕奕奕者局之無定者也詩人以憂心擬之余則以鋤刈糞溉治之豈不脱然無累也哉余曰善存諸心胷七八年偶有所感乃述其言以為記與曹秋嶽先生書桑乾風沙之内曽邀先生枉顧拳拳以生事學業為問誠哀家貧而憂失學也嗣後某隨大㕘胡公復過金婺偷暇讀漢書一年讀唐宋諸子又一年王子于一更勸讀尚書於是粗辨古文家數然舉筆臨文則又茫然矣竊歎古人學問有成類皆牧牛耕犢樵山漁水於窮困發憤得之未見有寄人籬下温衣飽食而能窺文章堂奥者也某棄而之閭里思欲究竟此道堅不出門奈老親弱弟衣食不繼不得已復走風塵為觀察祖公所留公稔某緣養親而出為預備父母百年事恒馳寄菽水某感其恩遇條畫治河數䇿時河苦遷徙口決運梗中外惴惴觀察以䇿上河憲河憲上大府各嘉納報可不半年功告成某得抽身還吳因念江南文衡客嵗有伯樂之顧益急圖下帷恐負知已乃還視故鄉無一枝可棲為養親地又不得不擔簦出遊冀越中當路稍潤巾缾歸買一畝之宫率妻孥奉髙堂甘㫖再出餘貲俾弱弟分半耕讀某亦得不憂饑寒則三十年以後之心思氣力皆可不用之衣食而専精畢慮於文章此某生平之榮願也某到湖上之日即謁林鐵崖先生始知先生讀書客中便期趨侍教誨以足痛未果不意先生折節先枉存我逆旅何前輩愛士急而憐才切也夫軒蓋聲施之地往往奔走貧士有同雁鶩而士之傴僂屈折於其門者仰伺奴僕意色求一登堂尚不可得豈敢望大人先生之就見哉某於今竊自幸矣幸大人先生既不我鄙棄則必以若人或有一得可節取而造就之故不憚孜孜汲引是以聊自壯也抑聞先生囑鐵崖先生語須勸勉嵇子讀書至諄至切則又何相見之暫而相期之深遂相督之嚴也某思古人學問要皆有得力親切之人如一瓣香専歸南豐者事非一二某待今人詩文頗嚴然亦不肯輕恕古人若時賢中大人先生有類先秦兩漢初唐者則又不啻古人之好好之矣方今海内名碩輒云子雲多而桓譚少某正謂子雲未必多也不過往来稱弟子者一二虚聲侯芭耳芭文不見於世乃以為揚雄之書勝周易殆過諛甚矣某不爾也某於當今鉅公詩若文顧亦曽手追成書矣然每不自量竊欲厲掌奮膝以紹禹功獨於先生詩文未獲全本十年之内或從一箑一箋積纍鈔錄合諸體不滿二三十首以此為平生憾常擬負笈躡蹻不計道里修阻從先生小胥私乞縑緗繕寫數帙又苦魏勃無路可効掃門今幸先生駐此則某可省夢寐之勞與風雨郵置之瘁先生顧何惜盡傾所藏稍飫調饑使一介鯫生稛載而歸淮水也乎伏楮待命可勝發憤上嚴灝亭先生書某少碌碌四方余澹心為字留山梵林圖之越數年秦淮樊圻謝成吳宏髙岑鄒喆又續為圖合肥公官司寇時愛而題曰疎林茆屋步步引入山之夢櫟公覲長安相遇白雲觀中亦有黄塵猶在面辛苦賦留山之句又題曰樹前石背有著雙不借循書聲而来者非他人乃櫟下生見山比部更變為五湖操艇之圖詩云我慕鴟夷潔期来弔五湖自是江以南北莫不知有留山堂留山堂云然某實無堂也年来方伯袁公廉使金公贈買山錢始得置屋溪上而四方之熟識某者仍在車塵馬足間卜之而不知某實有堂矣夫豈惟有堂且得名公大人如先生者枉存陋巷足辱蓬門使鄉人知有長者車轍某得稍賢於傭販牧豎之萬一且不至如往日尋聲覔響索某於東西南北萍水無定之鄉不亦大可幸哉某今更有望者先生之詩建幟中原吾黨詠歌已久獨先生畫不多見知先生不為世作畫某竊擬先生畫當蒼老疎宕全是元人其秀潤圓潔仍本宋人家數夫元畫非别有源派不過脱胎宋人化整為散化正為竒化刻畫為髙脱先生蓋真用此意哉間嘗攷之周時禮明樂備六藝浸淫畫從此始穆王時其臣封膜作畫厥後帝王之家設立畫苑學士公卿間以繪事應制則畫亦非尋常山人墨客小伎薄倆而已也某今請先生為作留山堂圖其間柴門流水破壁頽楹固不足繪願先生繪其境界峭特者俾某異日短衣犢褌推鹿車載父母妻子入山當以先生一圖為今日百朋耳舍弟師巢亦粗學作畫特令齎縑造門長跪以請伏惟教誨不宣與周敷文書去嵗作書寄足下迫於跂慕誠不能己時觸境造辭中多感慨失之亢激非所以通殷勤致繾綣也深恐足下以鄙妄見病用是慚悼積今彌載比得張子書来知足下意中尚不忘僕幸甚幸甚僕少不自重好詼諧雜劇譏刺平生不當意者自知獲罪名教復不肯劌心帖括與二三少年馳騁塲屋獵取聲華長老先生每見余所為則羣起而嗔責之謂之怪誕比年念髙堂垂老乃始撏撦章句謂可希世干進然廢日趨時而學終無補於古人充棟之書又十未見其一二然後悔此事之誤人而春華秋實之兼隕而落也因遂盡棄其口誦手抄之文復肆力於長老先生前所嗔責怪誕之事又以學識未堅探索未廣漫然行文僅取佶屈聱牙艱澀險僻者以為差異今文不知其大悖於古文也逺矣近益爽然失惝然思取五經晝夜讀之更取孟子左國遷固史漢晝夜讀之又取唐宋韓歐兩子晝夜讀之方知聖賢文章未有言不見道而能傳於千百萬世者也僕今且未敢言文而先學道道苟一日有成髙可以辨古今治忽善敗人品邪正真偽如辨九宫黑凶白吉黄平碧毒分照天下也即次亦可與少年馳騁塲屋獵取聲譽不至如時文輕脱滑利故多其轉折空其字句令人見之亦喜然去之竟不思也僕向往来江淮交遊不乏邇以教授生徒刺促尋丈之地盤旋坐卧顧影兀兀又不獲勝已之朋進徳之友相與切劘淬勵俾得蚤聞道也可勝歎哉可勝歎哉僕生二十七年忽忽悠悠汨没殆盡往者既往来者將来新者未新故者仍故計人生壽考之年以六十為準如僕輩鉤深致逺勞形敝神又當少活十年此五十年中已過强半其間進退甘苦行止順逆天時豐歉人事夷險境遇離合情慾悲歡大抵不過如此其後二十年中亦不過如此即推之百年寧復有異誠知生人之趣有盡而見道之日難遲也僕聞足下學道頗力因求所謂勝已而進徳者舍足下其誰與乎僕知足下善事老母足不出里閈有嵗時伏臘之樂僕兩親皆白髮待養於僕之一身又以山川阻隔非可朝發暮至每見風俗除夜雖傭販牧豎皆知買魚沽酒宰雞割豚肩羅列五辛跪拜膝下稱觴頌具慶僕士人已蹉跎承歡者六七年而今年又復蹉跎興言及此便已摧心傷骨若受鋒刃此誠仁人所共憫惜也今足下只盈盈一水相見無期僕擬買棹錢塘與足下傾倒數日夜徧歴窮崖絶谷飲醇過日勿復談文章得失湖山有靈其并持此書訂之寄林鐵崖先生書每從放庵家兄處讀先生往来手札深到婉摯如託肺腑舍姪輩叨侍几席奉教誨有通家之誼某獨不得從先生遊為可怪也某道經西陵者數數矣食榖於人動止拘攣身無童僕道路茫昧出不知所之行不知所底雖生嚮往輒復坐廢某自結髮讀書以家道中落奔走饑寒學殖荒落無有一是近因老親垂暮竭力不遑私欲退處井閭業於醫卜一終反哺之願但諸弟孱弱耕讀兩失若某一人朝夕自奉甘㫖不如督諸弟成立各能揚名親心懽悦尤甚於養以此怵迫東西手口交瘁乃直道事人動輒得咎能容於大江南北而不能伸於咫尺之地為當代賢士大夫所體貌而受讒邪小人之間沮吾道多窮可勝嘆息自夏徂秋悲傷感憤竊慕古人窮愁著書之㫖因撰西京雜語三十篇就正有道以病中書嬾左右又無書之者求教之心逾勃勃今先檢舊文二十首呈覽幸賜批抹倘狂夫之言不悖於道然後敢徐出其有以辱斧斲否則養羞藏拙而已昔李翺之作不經昌黎指授則不能傳蘇軾之文既得歐陽知已因而大著某之望於先生者豈其㣲乎豈其㣲乎羅舍人入直西清序癸夘冬余從友人入燕舍舘之次日聞舍人文戰不利留長安未去急往訪之塵沙蔽天寒風砭骨夾雜牛馬間輷輷殷殷心目惶惑薄暮始叩舍人扉見其敝帷破篋几榻蕭條僕多饑色是時舍人他出余詢其僕曰爾主人何至是乎此地多貴人長者豈不能惟朝夕是謀乎僕曰主人素自愛每朝懷一刺出門至暮無所投竟返以是潦倒羈棲罕有知者主人亦不求知也余曰夫既不求知矣盍歸爾田廬乎僕曰主人慷慨離家與主母決誓詞謂當肘懸金印紆朱拖紫拜父母堂上已而拊小主人之頂嗚咽不能聲遂振衣而出挾空囊襆被孤身寄五千里外今雖下第尚喜朝廷多途用人儻苟且就一官邀升斗祿免嗤於鄉里小兒亦平夙心君何輕言歸也余愀然曰今人作别妻孥歸先計期行先計日擇吉治裝灑酒祖道戀戀不捨短氣於房幃之中爾主人抑何壯也越一日得晤舍人舍人沽酒燕市酣嬉淋漓然後别去越數日再晤余將放舟南下問舍人何所屬舍人無言但曰東望㑹稽煙樹蒼蒼雲山漠漠為我殷勤致之甲辰嵗秋舍人遂得官余乙已春復至都門以酒賀之曰子可以上報父母下慰妻子矣舍人於是具述其由而繼之感泣余知舍人向非忘情於家也蓋有大不得已焉舍人尊公作宦淮南士悦民懷久於其職中罹禍變坐逮吏議比法曹白其寃而已狼狽不遑矣攜家東歸僅敝廬數椽瘠田數畝家人耕種力作以為饘粥教子弟讀書益勤舍人慨然興起曰余少年矜氣節慕交遊破費兩大人資産長為農夫以没世大人何賴有子哉以故發憤而至於此也今舍人方出入金馬門以左右宰相給筆札戴星而趨日没而退食凡禁宻之地大臣議事之堂中外不得與聞者舍人先習聞之以視偏州下里曲士小儒誦通都大邑條教號令則轉相告語父老以稱道新政者其相去不既天壤哉又見進士初作吏者類起家縣令始仕刑官幾經遷次猶不得望承明之門躋清華之選舍人可用是自壯矣而猶以出身太學為憾毋乃過歟余與舍人垂髫同學始讀書公路浦舍人年十四已補弟子員余年十五尚寄籬下舍人學舞劒興發時染翰濡墨狼籍几案余好吟唐漢人詩歌樂府及宋元詩餘小説暇則彈碁射覆以成嬉樂繼而讀書傖塘萬山之中雞犬閴寂水鄉屈折魚稻肥美余常濯足溪流櫂歌横發舍人入長林豐草張弓射雉鳥獸駭然驚大笑而返夜歸讀書童子瀹茗剝笋動至達旦自是余列庠吳中隔兩載復往㑹舍人於山陽讀書鏡林署中舍人折節好學醖釀老成為文宏通典贍期於自然中節而止舍人素以兄禮事余余得以猶子常拜兄母夫人母夫人曰爾小子幼年結納願始終不渝窮達一致有如古管鮑交因各受命唯唯余今逺不逮舍人矣舍人致身青雲嵗食朝廷廩祿給錢若干榮顯二人光寵閭里内擢則為部郎外授則為郡佐人生讀書之願至此稍償其半又况聖朝用人超軼前代於西掖近侍之臣尤加優異凡有殊才皆勅禮部應春秋兩闈貢舉登進士髙第猗歟羅子雖致用未宏而荷榮斯赫矣獨恨鹿鹿如余者四方餬口舌耕之苦病於夏畦所入不足以養親所得不足以置産時人非之笑之以為鬚眉長大無資身之䇿有内顧之憂缺室家之歡絶風塵之望舍人則曰子時不利也非才不售也然則人生知已寧多得乎哉故於其入直也作文以序之祭海神廟文代康熙六年丁未秋九月淮海道某謹以牲醴庶羞之儀棃園曲部之樂致祭於海神之靈曰維神司幽維官司明幽明雖殊而治河之職掌則均也神自赫聲濯靈以来率土之濱靡不儼若而淮為四瀆之一神尤萃聚故俎豆者更衆浦人祀神匪朝伊夕一旦榱桷不修茅茨莫翦神即未嘗過問其如下民失瞻仰何某偹員淮海禮當禋祀廟靈未妥某之罪也爰庀厥工以葺斯宇旦晩告成神聿寧止是未妥之靈既將飾廟以妥之在監司可告無罪於神矣至於神之所攝者河若令水失源流堤仍崩決吏遭嚴譴民困力作此獨非神之過乎伏祈威奪黄河恩全赤子俾旁流復歸正道突堤蚤賜成工庶神人交得相安而馨香彌見悠久也否則以數十萬之窮夫當十一二月之霜候胝胼卒瘏皸瘃狼籍卧凍吞饑迎風立仆神忍乎不忍及今惟有急挽逆流速奏安瀾保全萬死之災黎黙䕶千年之疆土使本道無曠其職業爾神亦自愛其功名毋忽尚饗辨禽言者説金華衆山中産幽禽好鳥弄新音怡恱人耳好事者致之盛以雕籠飼以香稻肉食晝貯清水濯之懸洞房邃閣外以為嘐嘐可聴如笙簧之迭奏絲竹之競響也客有辨禽言者過而聆焉心駭其聲語主者曰此非愁苦無聊羈棲怨嘆之聲乎不然何其哀鳴宛轉而頓失山林之常度也主者曰有是哉子誤也客曰余往者山行見灌木之上豐草之内青溪曲澗之旁有若禽者載頡而上載頏而下或飲或啄且鳴且飛其聲曠逸而清逺疏越而嘹亮幽閒而和平今反是是桎梏之也盍舍諸主者曰噫是何言也余朝擁衾牀上聴其音則欲起食不甘㫖聴其音則忘饑暮倦而思休聴其音則節勞而釋困果其桎梏之而哀鳴宛轉耶則余何為而樂也余固不忍舍也客曰不然天下有在已為樂在物為苦者有忘物之苦恣己之樂以為物亦樂者夫人亦然豈獨禽鳥云爾哉蛇鬼辨人情之所惡者莫如蛇鬼以其醜而惡之乎以其傷害人而惡之乎二者兼有之金華郡南城有廢署地頗廣相傳為宋自公堂荒穢不治叢茨蔓長鬼墟其宅蛇藪其圃人入於中者輒死不死者出云鬼衣冠壯偉乘黒蹇驢隂悍剽賊擲泥弄土塞窒生人孔竅以為嬉樂有蛇昂首引吭縱尾出樹下蜿蜒丈餘目光鑠電䠮踊而来如欲搏噬人狀長吏聞而驚戒守者扃鑰非乘傳百人毋縱入余以偪居暑病擇地而逃攜弟子及童僕三四人就自公堂後灑掃寢處薙蜾蠃除蠨蛸内懸繩牀外置石鼎鳥行於堦蟬唱於樹焚香讀書晏如也倦或登危樓陟荒臺經頽廊弔蕪苑選石而坐清風之來灑濯其心夜則螢火紛如蟲音喧寂幽夢逾清旅懐不溷廼知向者相傳之謬也抑又思之彼其有託而言歟鬼之為物隂也蛇亦隂類陽道不勝遂結而凝隂隂氣太銳復犯而乘陽此君子道消小人道長之象也不然鬼之毒吾人甚矣蛇又濟之以虐人其尚有噍類乎抱犢山房集巻五
