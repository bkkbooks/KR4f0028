body:
  text: 抱犢山房集卷一錫山嵇永仁撰詩吉吉吟并引吉吉吟者何東田嵇子於甲寅三月同中丞范公罵賊被繫禁錮難所至初冬之夜夢遊東嶽見諸靈異都非悼境已而仙吏降階延佇似皆熟識者仙吏身後各有一役抱一大硯不知何義想亦掾曹之屬供紙筆於殿上天子耶寤後境猶在目知非恍惚之所結搆遂倩人齎香楮丐神明之我告神示以籖曰石榴花發後此事甚分明至今佩二語於胸臆間耿耿如也越一日又夢仙吏執手板於側余叩之曰自何所來答曰斗部他無所語再叩之不應但以手板默示余凝睇其上有古吉理侯四字其蓋包藏余之歸期乎人生流浪海中其苦無涯生寄死歸熟計已久時至即行無復痛惜所難忘者垂白之老親耳天或憐念東田子之死非死於貿貿而欲鬻利危疆也非死於懵焉冥焉而不知速去以逺害也乃死於義也死於義則天何忍使義士之老親不得所於家鄉耶此又不可必而可必者也余於積病之中著百苦吟和淚譜又東田醫補十三卷其餘正欲次第闡發奈禁錮已久病患愈深起居之際不能支持著書之事從此寢置余之半生苦心血於鉛槧者亦徒結來世之緣而已矣誠恐形神一離有筆難述尚就可以攤紙吮墨之時隨意所欲吟輒筆之於篇總以吉吉辨其首云秋夜次蒙谷韻范制府在難中筮得蒙卦别號曰蒙谷寒衣何處授徹夜紙窗明節近天香逺人稀鬼火生枕書多是淚死國亦無名千水千山路捐軀自有情瓶蘭次蒙谷韻嗟哉王者香幽谷紛未靜採擷人自喧詎奪山巾性春風不入帷秋月照孤境賴此數日妍芳馨彌老徑雨夜詠袍次䝉谷韻蕭蕭風雨落花茵海角天南擲此身泣擁牛衣無少婦卧虛布被愧平津寒來空自聞敲練冷到方知有結鶉裘葛與君為故物未能消受總酸辛雨霽即事次蒙谷韻北馬南轅何所圖麟愁鳯泣為誰拘卧聞嶺上風雲合棲向籠中羽翼枯腐血錐心魂自黯熬形錬骨氣難蘇壯年贏得成衰老雨後頽唐酒一壺癸丑秋邑侯吳公餞余於聽梧軒招集秦太史對巖陳進士椒峰暨詞客殳山夫余淡心諸子同拈踏莎行調末以憔悴二字限韻詞中有孤城殘角夢家山亂帆影裏人憔悴之句余心怦怦動歸述之老父欲不果行老父曰相國舊誼其忍負之遂促余行至幕府日輒病脅痛號欲絶恐届不祿之辰歸念頗切舉顛末告之蒙谷蒙谷為余解憔悴之意亦和一詞詞內有云城郭無光村煙失翠瞥然一見心如醉停驂暫緩入山期哀鴻待爾離憔悴余讀之驚愕私謂許子九日曰言者心之聲也何為作此不祥語許子亦悚惕相對咨嗟知將不免因決情而去卒脫於難余緣情勉留遂逮於禍非知幾之暗也情所感激不忍去也不忍去而去非但薄情抑并悖義嗟乎嗟乎禍患有因端倪先兆今日憔悴至於此極余固久知之矣乃作憔悴吟余本抱犢人東臯有荒田荷鋤將經營課僕耕雲煙天南節度不肯放聘書早到薜蘿邊薜蘿閒挂處士牆處士一去令君傷招攜賓客置餞觴吐詞製調魂飛揚有心負米戀草堂堂上念舊催治裝可憐離别九回腸陟嶺逾灘躋險峻一步一望吳天長羇棲伏枕藥罏間海濱倦鳥思飛還好音慰藉情凄婉勸我停驂遲入山好友掉臂行病夫銜淚住張羅設網日月昏冥冥翔鴻去無路雨雪從來霰集成蓍龜四體先分明自是愚忠被束縛休嗤野客迷歸程吟來憔悴看雙鬢只恐秋添宋玉情被難之日尚挾鈔本祕書數冊恐其窮搜因預探而出之祕書幾卷出懷中委向泥沙黯淡同過目雲煙皆幻物驚心文字亦飄蓬青氊無計偕歸嶺白夾何由再御風若使上林徴著作茂陵詞賦故園空分啖白石榴炎方産果物得此朴素質寄來憂患餘分甘口難述結體大如拳含漿潤同蜜備嘗艱苦人離離飽其實我昔夢東嶽靈境天剖出殿上瓔珞垂殿下冠裳即明發再叩神神語生凛栗盼取榴花後便是分明日花發子既結尚在幽暗室觸景乃回憶莫非應驗疾禍福不可言上帝重隂隲我公能格天風雷任飄飄生死皆得所慎勿懼斧鑕從前相依蒙谷者受其恩辜其德盡為衣冠中之穿窬及受難日此輩皆不與豈奸狡之徒巧於攫金者亦善於避禍歟余與林翁能任王翁幼譽沈子天成皆落落寒素家無儋石之儲堅守硜硜之志與公誓同患難不畏刀鋸不豔勢利逆雖百計挫磨初心不拔彼奸狡者應揶揄呆漢之捨生取義也為作顛倒歌顛倒英雄孰是非伯夷餓死盜跖肥太史著書發悲憤問天不應增歔欷寒儒好古艱遇合牢落科場遭踐踏肉眼豈識璞中玉銷魂還逐風前蠟家徒四壁依傍人巧者致富拙受貧憂讒畏譏嘆維谷猶幸知已愁眉伸道義相交淡如水金多交深物所鄙小人有母孰養之千里輕身浪擲死死忠死義原相成惟有罔極魂縈縈山鬼揶揄誇明哲閭里溫飽翻偷生辜恩報恩君莫計世上休輕天下士金烏玉兔疾如梭千秋難解顛倒意請君熟讀顛倒歌英雄英雄可奈何䝉谷每逢慶辰輒望北再拜詩以紀之古人每飯不忘君忠孝何曾患難分鐡鎖久嘗心似鐵雲山難阻氣如雲但求北極星辰拱忍對南冠鬼火焚那得因風生感悟盡銷壁壘付斜曛王幼譽夢同登金山寺題樓額以開暘二字應之北固髙樓俯萬尋往來繫棹一登臨夢中尚作揮毫客江鳥江花共短吟其二暘谷開時浴火珠渡江春色栁梅俱樓頭收盡無邊景記得分明是此圖索藥書我讀軒岐書平日甚了了自謂此中人心目始分曉雖無折肱勤亦既窮要渺危病偶一試庸醫顔色悄方知神聖徒不在萬物表出門攜藥籠男婦輒環繞頗能去疾苦壺天未嘗小即在禍患餘起疴亦不少誠恐先朝露著書盈寸杪精力日以衰筆墨覺繁擾方帙散與衆冀拯枉共夭公裕濟世懷顛沛尚矯矯視人有痛癢酷似茹荼蓼為我覓殘書痌瘝謝億兆寄養生書囑令鈔存余家中散公好習養生言才多而識寡不獲終天年鍛鐵栁樹下彈琴竹林邊飲酒好放浪傲睨權貴前其意薄人世但願為神仙子孫多修逸猶得讀遺篇仙家書浩瀚精微難以傳所留雖糟粕亦能破拘牽公在蒙難時几席列瑶詮探討如熟悉寄我意拳拳洲島邈難即樓居復迍邅靜觀聊意㑹恩義等雲煙安能寫黃庭猿鶴相周旋病中與沈子天成萬折千磨病體纒秋宵起倒一絲懸勞君燃火炊糜熟夢阻還家半覺眠其二藥碗參苓日所須而今伏枕尚躊蹰艱難始識天心好消受平生粥一盂余輩在難所夜不貼席每晨輒鼾卧難起林翁晨興料理盥水糜粥為賦辛苦篇辛苦復辛苦老翁殊太賢鮮衣美食數十年一朝患難自炊烟我輩頓忘服勞義紅日曝腹猶鼾眠翁本宋代文昭後淵源理學名家胄蚤歲投筆慕蕭曹繡衣御史斂容就海隅明末擁唐藩參軍一官且拂袖擾擾塵氛不可知欲隱山顛與水湄攘臂下車愧馮婦履尾猶幸脫藩籬裹糧棄家遊方外元戎下士虛左待疆場正值用兵時牖户綢繆桑梓賴鯨鯢出沒繫安危招徠恢復知為誰盈庭無如李閣部節制八閩安邊陲運籌決勝視帷幄大半皆出翁所為樓船勦海紛紛舉請修文德罷師旅紅毛謀入中國巢疏陳養虎未䝉許臨終遺草開漁禁欲俾遷黎早得所更是孤兒處危疑老臣有子淚盈楮防微慮逺翁德髙交情生死敢辭勞至今每讀樹滋集撫掌歎息人中豪英雄若以成敗論我曹難免逐泥糞推心置腹伊何流一籌莫展空拳奮鎖聲琅琅柝聲淒與翁起坐聽寒雞勸翁且復就髙枕明日敲冰和菜虀蒙谷以炭畫壁自云目之為狴犴聲孤臣畫壁炭痕香十日熬饑絶水漿叫破帝閽俱是淚嘔殘心血更何傷留題觸手無斑管得句驚魂對土牆只恐他年重拂蘚斷章零落泣斜陽冬夜夢回月照孤影聊以志感次蒙谷韻憶公趨神京後車前旄旌祖帳紛絡繹縞紵贈分明握手盡賢哲登堂叙弟兄所重在道義殊覺意氣橫輦下久濶絶卿相猶知名輪蹄日滚滚暗觸紅塵驚外吏縱清貴焉知內峥嶸鴻鵠遭彈射弋者思逺征此鳥薄雲霄網羅安可擎愧彼髙蹈蹤出處心交怦聖明未敢負事業殊難成非若太平時張弛無變更公來當其厄飲恨復吞聲報國惟捐軀延喘待時清留取嚙雪志無玷丘園情僕本爨下餘亦復同哀鳴梁溪溪上泉濯足兼濯纓此願不能遂翻身騎長鯨讀公還家夢英風吹北平燈前梅影次蒙谷韻凍蕊苞含霜雪痕吹香散影若生根怕隨籬落沾餘土盡掃鉛華慰斷魂屋角酒杯難一醉天涯紙帳幾同溫無端飄墮成孤質寒鳥啾啾叫破垣偶成貧女自村野使君覺姣好不以色事人進退一以道妒者集如蝟視之若蒿草蒿草有時枯金石不可槁回視眉黛人能得幾偕老區區朴陋姿患難實為寶籠中畫眉次䝉谷韻夙昔隔人境飲啄自靜好徘徊郊外山棲止雲際島撫躬雖渺末氛祲無足惱青鳥傳素書黃雀銜至寶是物各有奇志豈謀粱稻誤墮虛聲中塵垢不能澡生死屬他人禍福奚足道閬苑有瓊枝𤣥圃有瑶草舊時嬉戲場拘墟空在抱此身寄樊籠此心戀野老覽鏡中白髮次蒙谷韻漫誇龍鳯大夫姿何似山郊祝壽眉用世自然難避世酬知焉敢效無知三分駿影惟存骨一種顛毛但有絲不分此生憔悴盡旁人猶道是情癡䝉谷以炭畫紙上書顔杲卿伯夷蘇武三古人相詢欲擇一為決絶地也但被執大罵求死既不得十日絶水漿求死又不得是杲卿伯夷天已不欲令其繼之也無已請學蘇武為作擬古詩常山舌既乾兩耳了不聞聲留白刃間遲回遏隂雲首陽腹已餒薇蕨徒芳芬精氣彌豪放鼎食安足云維彼蘇屬國持節牧羌羵十年如一日冰雪嚼紛紜求死既不得堅志豺虎羣從容與激烈大道原無分上林白雁札終得達聖君願言勵忠悃天心將罷軍紀異香煙繚繞壽亭祠千古衣冠繫所思忍使忠良遭陷溺先教烈火自焚帷甲寅三月望晨署中關帝祠神幔空中舉火自焚鳥雀空靈得氣先知幾無復戀簷前人間兵氣猖狂甚入屋紛紛似避鸇是月之內簷雀如驚鼠狀悉避入屋內貯水凝空瓦缶盈朝朝挹注藉澄清無端聲剨如冰裂從此兵厨不問羮厨堂外有貯水大缶容數十汲者忽然寸裂扃鑰重門霜較嚴下帷童子絶窺覘如何黑夜聞排闥屋上狐狸影自潛幕府鎖鑰夜間如有物出入及平明封閉如故官扇迎頭舞向風馬前儀衛去匆匆天清日白回飇急五帝祠邊沙蔽空蒙谷是日馬過五帝祠其掌扇無風自舞從者竟不能持秋夜夢回紀舊事次蒙谷韻尚方賜藥拜恩濃紫禁宵傳出祕封刻刻五雲馳慰病盤盤大內撤殊供身當逆難堅金石夢到雲霄渥鼎鐘自是臣心通北極遙知南望淚千重初度自嘲即次蒙谷寄祝原韻人生四十更何為仗劍天南負所期平世虛生留氣魄危途迥立見鬚眉關山涕淚庭幃逺賓主伶仃天地悲還憶田間農圃舊短衣破帽也相宜其二一到兵厨滋味忘飱荼茹蘖覺尋常萬千苦盡天心在九十春深馬齒強鬚鬢星霜前嵗白形骸土木近來蒼老親倘記兒時事蓬矢桑弧總斷腸其三野鳥於人何所圖網羅驅迫阻江湖風波匝地身粗健骨肉全家眼已枯國難到今縫掖重塵埋此日壯懷孤青春莫恨無花放留取花開向晚途其四買犢將耕溪上田田荒犢老客迍邅誰能沈醉忘千日我獨知非早十年仙佛學來塵劫內柏松厯過嵗寒邊何時重整犂鋤具夢想桑麻已隔緣其五寄我新詩慰我情遙知義在萬緣輕蒙谷題抱犢吟見贈有義在萬緣輕生死遙相守之句衣冠文物䝉塵垢襆被琴書付亂兵病裏兩年神愈旺歌來百感氣俱平人間若不逢霜雪桃李春風浪得名其六檢㸃年華次第吟清明才過雨淋侵儒編盡向風塵誤醫學新從患難深幼子愚頑留侍祖孤身陷溺賴知心古來忍詬還强力世上浮名酒漫斟有云蒙谷步履難移起立需杖扶之聞而嗚咽與林翁掩面揮淚公年才四十憂國髮早白况嬰非常變戈㦸相逼迫挺身蹈鋒刃殺者翻愛惜明知不可屈復恐縱羽翮正在危急時天地走霹靂電掣金蛇光雨噴神龍液晝夜晦冥中燈火慘然碧欲操生死權到此亦無策重牆加禁錮遂與人世隔勺水粥半㿻精力就枮瘠寸步倚孤笻艱難在咫尺有時肆訕罵左右皆辟易人生無忠孝何以持氣魄我與諸同儕忝公座上客聞聲而噓唏淚落腸崩坼誅孽與扶良天意方顯赫月下松濤次蒙谷韻皎皎窗櫺月照此衣內珠淡泊類禪寂聲沸心常孤淜湃如奔濤萬馬爭須㬰已在金戈中何暇慮雈苻誠恐天宇崩袵席無良謨去嵗雷雨震隂陽儼合符今嵗大風發赤子難藏軀丁男習鼙鼓老弱供役夫十家九出門隂屋走妖狐境外野狼集境內猛虎驅寧任虎狼食患難不相扶當其處堂時燕雀笑人迂蕭牆布荆棘決裂暗逺圖神龍一露尾豈能顧頭顱我非明哲材頗稱抱杞徒憂天不恤身未免死道途夏日猶若此冬夜非有殊心骨亦以摧遑復問肌膚憔悴二三子兀坐室西隅寒暑共逼仄何時步通衢死者業速朽生者尚故吾願天早息兵賊首先伏誅逍遙松風前掉頭洗塵汚䝉谷寄心經說義覽之頓覺身世皆空亦火宅中之清涼散也系以詩齊梁佛教入中國翻譯金經重石刻自此默證西來心便覺塵網縛羽翼名教大端在君父語言文字黜楊墨究竟生死是苦海尋津覓岸此為得遭逢劫火性命輕不空諸有即迷惑鼓山袖子演宗風開堂說義破茅塞髠翁原屬過來人焚香靜悟手一則大千毫髮照鬚眉日月經天何可蝕却掃蒲團向上參此經化作青蓮色蒙谷見遺雪梨五內俱煩熱渴飲不得漿雖鄰大道側綆短愁汲長火雲大如輪炙手如沸湯家居名泉里輕身去故鄉夢寐九峰下涓滴生清涼如何墮羽翼陷溺摧肝腸握此香水梨感激意相將平日推食心固結為哀傷曾幾變寒暑遂致成滄桑入口猶唾餘沁骨誠難忘願與同懷子甘苦始終嘗餉蜜羅柑藏柑前嵗寄髙堂三山方物殊清香不得太平同一啖羈囚異地心倣徨倣徨分食難下咽兩載相思不相見劈破盈盈似淚珠吞聲還復胸頭戀此柑漫說甘如㫖天下酸心未若此對顛僧鎮日向魑魅無如對此僧笑來天際闊癡絶道懷增弄腕馳風雨忘機掃葛藤不知竒險地偏自踏寒冰䝉谷見示云欲寄微物將意守者不從為之悶絶敬答東南鼎沸何物有但願骨肉今速朽求死不死天胡為欲寄故人遭掣肘鯨鯢作浪風波邊借問幾時安枕眠夢魂各自能來往留取寸心明月圓贈王龍泉守備壯士不負心臨難獨慷慨秋霜寒肌膚百折亦何害飲酒飽啖肉豈肯就狼狽平生殺人多此身無沾蒂生死等閒間主恩總難昧偷顔祈苟活名節將焉賴黃金養健兒大半是狡獪但鼓脣與舌水火成寃㑹希圖保妻子罔知忠孝大違衆懷抱同君家稱竒最斷葷學佞佛萬事出天籟侯翁舊將也年已七十矣隨公南來有妾相從紀氏處州人年未滿四十難作之日自經而死一僕婦一蒼頭同時并死噫亦烈矣哉侯翁徐州之賢豪彎弓遼左筋力熬壯嵗馳驅能自立出入營伍多勤勞致身建節貔貅上衝鋒冒敵邊海瘴數十戰陳飽經嘗老年氣槩益精旺甘心閒散歸舊里芒碭有田買耒耜攜家原為報恩來節度當年恩重哉覆巢生死不可知正是裙叉決絶時臧獲相隨黑夜月耿耿黃泉淚流血七月二十八夜大風吹瓦自四鼓至次日已時雨淋淋不止僵立其下冷顫欲死為賦怪風歌大風吹瓦落葉飛天昏雨急穿四圍蓬頭赤腳如鷺立毛羽濕盡無所歸淋漓水深積尺許危檣逆浪爭幾微傾山撼嶽森嚴威金戈鐵馬聲依稀人生患難至此極空羡季女守斯饑季女斯饑巖穴端縱然陋室亦清安任他拔木牽蘿補即有傾盆當瀑看出門正踏危機內何止凍餓稱艱難炎蒸寒濕疫癘攢虻蠅蟣蝨紛成團戾氣所鍾焰難觸呼盧使酒生波瀾驚魂未罷驚又起一日恐懼千萬般為公死豈偷生公尚在死無名百年之內怪風少此風應感天地情漂母吟贈祝子再賡淮隂窮餓日垂竿遇漂母進食哀王孫此意自千古僕在瑣尾中蛇鬼混為伍夙昔厮養兒攘臂亦作武唾穢滿牀頭低聲不敢怒拚此垂盡身輕人若糞土豈知刀砧餘尚復戀故主上天鑒寸心皮骨未盡腐雖然昏濁時塵外各有取祝子英雄姿冰雪濯肺腑結交第一流賢豪屈指數卓立清白軀不肯傍廊廡以此遘奇禍忌之類猛虎同時受縲絏笑談忘痛苦殷勤識故舊林翁驚相覩性命須㬰間且復勸酒脯屋烏轉施愛與僕話縷縷私意竊許可鯫生非狂瞽逼處慰晨昏疾病憐咻噢僮僕日授飱未嘗間風雨幸免食粗糲充飢安貧窶我非封侯相欲報君何補只此一飯恩緩死力重努和幼譽早春詩天時人意想陽春剛到春來笑此身凍雪已消遲暮恨寒花空憶小園貧炎方霽景推今日多難題詩有故人漫道彩鞭喧令節也知亂後各傷神䝉谷詠牆角仙人掌詩中垂念余病詩以答之一枝浪擲土牆根道是仙人掌上痕端為孤臣憔悴裏天開雙蒂說迎恩其二不服參苓已兩年每逢入夏痛熬煎憐余間阻殷勤問多少深情毫素邊訊林翁所覓書老人覓得幾般書夢蝶乘牛道所居獨有淮南子書好少年漁獵愧生疏毛子賓留除夕在禁寄饋燭炭楚冠同戴不同名爾為官來我捨生親在許人憂轉愧家忘為國辱偏榮蠟消除夜風前淚炭熱寒宵雪內情善易年來應更進漫持河洛問君平賓留善河洛數有人製新服見遺裂而返之苦殺王孫不受憐側身狼狽意陶然綈袍氣暖顔凝厚短褐毛穿骨愈堅挾策驚聞官況好埋憂甘作楚囚顛升沈異地真懸絶從此雲泥道路邊蒙谷眼力糢糊寄詢方書藥物眼光豈似漆患難總蒼茫淚染糢糊影愁看戰伐場方書還自檢藥物仗誰將何日開眸子浮雲掃大荒栁絮行昨日街頭賣菜傭道是楊花滿城郭落水沾泥舞向風嘆惜朱顔賤揮霍東家西舍掩空帷别引春光入簾幕嫁壻莫嫁從軍兒地北天南恩愛薄弓衣箭室壁生塵物在人非惱閨閣前年跨鞍爭出門誓將飲馬黃河源吳嬌越豔生致取區區糟糠安足論事勢蹉跎嵗月緩枕戈卧鐵蟣蝨滿天道順逆常分明塞翁得失難預算藳砧志氣多驕矜自家枕畔不曾暖只道鴛鴦易作鄰拆夫散子供笑嗔誰識故園飄栁絮顛狂片片㸃芳茵生死沙場歸未得翻令家雞亂撲人搖尾行搖尾復搖尾毋乃當年之黃耳可憐走街衢三載不得肉沾齒低頭宛轉聽人呼路旁老兵將手指此犬當初遭豢養福寧甲帳曾棲止朝出獵斑馬鳴夕掩圍狡兔死鷹驕隼怒誇得禽捷足郊原無若此虎冠鎮將愛殺商海濱抽刃如屠豕金銀玊帛堆成丘後房子女前箜篌椎牛未肯厚養士狗欄日食分庖羞春風顛撲白日變昔時部曲今仇讐旌麾錦絡亦已矣蛾眉皓齒隨波流珊瑚既碎珍珠泣煎膏焚齒非無由獨餘此犬少著落蹄寒骨瘦聲啾啾殘漿冷炙便苟就何人拉上南山頭壬子下第後改治春秋未卒業輒遭禍亂念此事未了仍向友人借書窮研走筆紀謝鼓篋嘗受書鯉庭重風雅鄉孰所面命埋頭壇坫下窮年問毛公四始理瀟灑逼側走科場知稀遇合寡清秋嘆濩落匏繫傷草野誰遺數卷來同學手鈔寫云是獲麟篇校定不苟且公榖鑿鴻濛安定設罏冶時乖而道危此義未嘗假深愧記性拙日夕手重把管窺甫及半喪亂吞聲啞文章棄如土性命擲如瓦喘息今尚存嗜好獨牽惹死生固有分讀書志難捨向君借琅函一了夙業者李生李生貌不揚下筆能文章鬢秃尚淹滯資身無一長妻子厭藜藿十日九未嘗寄居市廛中徒手奚所將公來慰流離收拾附宫牆分俸給月餼骨肉完糟糠此意余獨解鼓勸誠忠良駑者猶不棄駿者感難忘一朝禍患作鼎沸如探湯甲帳走鼪鼯朱簾羅刀鎗驅赴殿角門拷掠先受傷余輩四方客同時遭桁楊維子隸宇下怪悉行與藏極刑聲痛苦大聲呼彼蒼公也念瘡痍開界活羣氓棄地多膏腴屯田在墾荒富國兼足食庶幾撐海疆立談偶相合被録受恩光條陳諸機宜事事皆心傷訊驗果非謬加罪真豺狼鬼薪楓亭驛血淚灑道旁黑獄二三子憂汝攖鋒鋩箠楚壞筋骨饑寒鄰死亡近聞里巷傳形骸尚未僵伶仃舊妻孥行乞共一方我家幾千里黯然魂飄揚劉紀綱太傅初入關紀綱年少小喘息隨鞍韉待漏驚天曉來往承天門入直五雲表抱裯還進食左右身繚繞從征絶邊塞冰霜凍飛鳥經月無人烟汲水百里少咄哉黃頭郎飛騰類騕裊雖多諸健兒不及此竒矯體㑹在意先忠厚省煩擾馳策三十年老大心憂悄買馬赴危疆賣價供荼蓼風波赤地起巢傾類俘殍束縛遭窮究宦槖詎微渺聞言氣激昻口舌休妄掉我主為清官天下人爭眺撫浙四載餘逋纍尚環繞東南財賦鄉未嘗愛寸草況兹閩海窮何忍困億兆請君檢囊槖百金用未了此乃馬價資蒼天所皎皎籍者意沮喪白圭色愈皎道路吞聲哀重閽冥且杳祝子再賡贈被地折天摧雲日黃與君同難各踉蹌網羅開後關心處襆被攜來穩夢鄉落魄無親空慰藉知音賴爾識佯狂庭除兒女盤桓足莫憶風波惱斷腸書寄炎海春三月傾覆梧桐枝疾飇驚鳯凰誤遭羅網羈昔鳴髙岡上今為羣鳥欺延頸不食粟心記朝陽時生理既斷絶逺與丹山辭早脫塵埃去免為䕫龍嗤丙辰六月初七日暈臺上占天禍福端陽烏黑暈盡團團禁中象緯書難覓大抵還從分野看病中三日不飱矣林翁為余治羮感而賦贈老翁傴僂向火罏離披榾柮烟糢糊手提五味作湯液殷勤勸我傾盤盂腸枯腹槁不知餓病中三日還伊吾生平善病怕伏枕所以形瘦肌骨癯蒙谷關心悉此狀養神切囑遙相呼也知筆墨耗精氣其如思慮無時無暫教揮灑吐胸臆猶得遣愁離斯須感翁厚仗翁扶脫非我翁旁調攝寧待今日歸山隅七夕前二日為內子生辰口占遙寄銀漢迢迢不動波針樓兒女指天河明朝未必牛郎渡添得年華愁裏多小院深秋拭淚頻三年三度好青春白頭吟在何曾負薄幸難為雜亂人范文肅公神影懸舊署被扃婦女嵗時斂錢奉祀感而紀以詩太傅遺恩在難忘患難中久疏家廟禮猶帶野芹風叉珥雖微值香花幸未空帝庭如不逺陟降慰孤忠我僕我僕去何急㸃兵赴海灘畫旗秋色苦白羽夜光寒問慰今何賴存亡汝更難未能攔道哭愁逐戰雲端螢火長夜苦難睡深房飛一螢似猶親故物全愧治專經勢撲燈檠火光凝屋漏星此身輸羽翼出入破幽冥聞蛩蛩吟秋共苦伏枕乍為聽宵柝淒方切鄰砧響未停初寒驚露白將曉厭燈青榮落籬邊菊三年淚總零多病秋來復多病何以遣吾情已識形骸纍難將寒熱爭攤書頭易眩擁被夢常驚輾轉還需藥持錢付老兵癸丑秋余婦送至吳門止於外家之紅橋莊是日天色甫明薄霧漫水面乳嫗抱兒輩佇立岸上若不勝慘切生離之狀人非木石孰能無情每一回思腸寸裂矣因作紅橋莊歌行秋風蕩漾扁舟早雙槳到門攪懷抱薄霧籠煙水氣蒸雞鳴桑樹催晨興懷中潔白鵝湖綾眼枯難拭淚痕凝良人逺遊意飛騰不知前路多寒冰雖然弧矢分所應臨深履薄生戰兢上有髙堂下乳稚養親教子將何憑出門兒女愁葛藤欲語不語長撫膺矯情揮袂急解纜蒹葭搖落鳬雁升野老滌場將打稻漁翁撥刺亦開罾惟有征夫捨耕釣紅橋莊上畫欄憑丙辰仲秋初旬值怪風雨自是天心厭顛狂風雨來幾年頻見慣今日更竒哉葉落飄簷瓦光騰起劫灰由來烽火地昏黑不須哀浪傳烏鵲何關喜好音總未知大都天下事還在口頭碑厭亂人情劇思安聖澤垂溝渠甘浪擲忍復見瘡痍和幼譽病起原韻時中秋前五日服食虛良藥蹉跎失意年青氊三載破白髮幾絲鬈瘦骨形尫甚新詩興勃然浪傳天上信桂在月中懸憶曾筠右丹兩兒恆居憐稚子繞膝自相親紙筆時偷弄詩篇記未真長貧今纍母急難仗何人想到伶仃處天涯倍愴神念别乳媪抱兒出送我里門首舟子舉布帆云俟河濱久擊榜衝鳧鴨解纜離煙栁盈盈岸上淚淒淒杯在手豈不立逡巡業已辭林藪父母促治裝長拜出戶牖丈夫身許人難與妻子守但恐隔别來骨肉得全否眷懷梁鴻溪愁雲結巖岫憶許子九日過灘詩有六時信厯三千劫一日真同數十驚之句宛似難中景象不勝歎息許子先我歸婁東還家猶幸全髙蹤口稱婚嫁不曾了更復衰年難從戎記得來時厯灘險驚魂把握溪流中那似江南鼓棹樂布帆無恙乘秋風似此欲前心反却回頭錯愕呼篙工垂老性命付一葉千山萬山愁無窮耽癖愛竒遊亦倦舵樓詩在感微躬往往念及神憂栗謀歸不忍首飛蓬天開地裂遭九死一生未卜將焉終忽憶我友灘邊句風波如此毋乃同小僮只有小僮在隨人馬足間經旬看故主信口說時艱甲帳秋方急芻糧夜未閒可憐渠病起征戍隔千山中秋次幼譽原韻傷心兒女月明中愁有蠻雲酸有風庭桂露邊頭共白江楓霜裏淚俱紅悲秋想去飄如葉未老頽然衰作翁山海戍兵何日罷一杯潦倒菊香叢記夢髮白雙親尚在堂嬌孫習字列肩行抱書問母緣何哭道是余魂歸故鄉囑林翁能任為余珍重殘詩墨瀋荒唐滴淚殘酸風苦雨未曾乾此身若遂沈淪死留與寒家子弟看抱犢山房集卷一
