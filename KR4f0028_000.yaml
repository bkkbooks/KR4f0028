body:
  text: 抱犢山房集别集類六國朝提要臣等謹案抱犢山房集六卷國朝嵇永仁撰永仁字留山别號抱犢山農無錫人康熙十三年耿精忠作亂永仁在總督范承謨幕同被拘繫承謨遇害永仁亦死難四十一年追贈國子監助教是集前三卷曰吉吉吟百苦吟皆其陷獄時與承謨及同諸人唱和詩曰和淚譜則為同難諸人所作小傳也第四卷曰葭秋集第五卷曰竹林集乃其舊刻第六卷附録同難會稽王龍光華亭沈天成二人之詩文雍正中其子曽筠編次付梓永仁以諸生佐幕尚未授官而抗節殞身義不從逆其所為詩文皆縷述當時實事獄中不得筆墨以炭屑畫於四壁閩人重其人品録而傳之得存於世令誦其詞奕奕然猶有生氣與范承謨畫壁諸詩同為忠臣孝子之言不但以文章論矣乾隆四十六年十二月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀嵇留山先生傳薑垐先生諱永仁字留山别號抱犢山農晉侍中紹之後祖居虞山父中書公以官居金陵先生嘗遊梁溪樂其山水家焉年十六補博士弟子員未幾食餼居家恂恂孝友生平無書不讀制舉而外雅好詩古文詞下筆千言立就顧數竒屢躓場屋鬱鬱不得志先生以父母年老出就館榖尤精於醫所至活人無算殆將安貧養志藏器以終身矣范忠貞公諱承謨者太傅文肅公仲子也中書公與太傅有舊忠貞公撫浙時雅聞先生名思折節下之先生乃以故人子進謁公一見深許有國士之目適奉命督閩延入記室邑侯吳公置酒為餞酒酣賦踏莎行詞多戚語先生心不欲往中書公曰中丞以國士相待揖汝為上客讀書所學何事顧不為知已用耶且太傅舊誼何可忘促之行先生室楊氏抱二子曾筠右丹送至吳門止外家之紅橋莊外是日天色甫明薄霧漫水面送者佇立河千淚涔涔下若不勝慘切生離之狀先生曰嚴父命敢不往顧念兩大人年過七旬汝歸善事堂上撫吾子吾行思所以報知已無為我戚戚也遂鼓棹而去入閩過仙霞嶺謁關夫子廟禱於神曰余此行佐范公救民也若萌利欲心必奪我嗣聞者震悚咸知先生志不苟矣甲寅春逆藩耿精忠將叛先生請於范公曰事迫矣與為忠臣寧為良臣盍早為備因為公畫策請撥協餉補緑旗額兵安插逃辨酌議屯田冀收拾人心殺賊勢又請假巡海之名提輕兵駐上遊制賊方是時會城文武大吏及公麾下士皆預中賊餌公號令格不行先生嘆曰吾輩不知死所矣有間賊偽張筵宴公先生誡勿往公曰吾大臣以死報國將安逃乎挺身往賊果誘公閉密室隨下先生及同事者於獄被逮時獰卒數十張弓矢執白刃驅之若就西市先生了無怖色謂同難王生龍光曰豫兩人氣誼頗同死之日願魂魄聚一處王生亦應聲許諾義形於面是刻天光慘淡日氣昏濁先生處亂尸血窪中俄迫至逆邸脅之降不從促草安民檄不從誘以官又不從賊怒甚欲置先生死地乃假章奏事令鞠者窮詰指為禍首先生毫不置辨曰死何足惜但願一見范制府得瞑目耳賊無如何乃命錮之先生在獄蓬首垢面械鎖鋃鐺寒暑燥濕蟣蝨蚊蚋攢嘬之苦靡不遍嘗方之文信國之坐小樓其苦什百也因作百苦吟忠貞公與同難諸君子俱屬而和之先生工詩尤善填詞少所作遊戲三昧一種膾炙人口至是悲思憤鬱所作皆極淋漓沈痛不堪卒讀賊甚惡之防範嚴密禁絶楮墨乃燒桴存炭圗著作於四壁入夜隂房鬼火照見壞牆字迹熒熒飛舞先生擊節而歌羽聲悽愴聞者唏噓泣下范公寄語先生曰死吾分也君何自苦為先生曰死於忠與死於義一也各宜努力幸勿為念幽繫凡二年於康熙丙辰九月十七日范公遇害先生聞之仰天痛哭曰所不即死者欲從公有為也今已矣遂自縊死同死者紹興王龍光松江沈天成瀋陽范承譜三人次年王師進勦福建平制府上其事部議以先生係諸生無贈銜例令所在給優恤銀若干兩先是賊以殉難諸人尸骨毁棄郊野三山林子能任覓先生骸骨製棺殮之至是先生之僕程治得扶櫬歸方先生之殉節也室楊氏僅二十七嵗聞之水漿不入口誓以身殉後以舅姑老子幼忍死守節仰事俯育茹荼集蓼凡二十八年次子早夭卒撫其長者成立壬午曽筠舉孝廉楊氏以節婦建坊表閭而范公之子時崇開府廣東念先生之忠且義力請於朝得以諸生贈官國子助教崇祀范公祠蓋異數也丙戍曾筠成進士讀中祕書天子稔其家世每禁試咨賞者再丁酉擢置講帷特授山右學使者曾筠清廉有守所得皆寒畯晉人士稱祝之人咸謂天之報施忠節不爽云
