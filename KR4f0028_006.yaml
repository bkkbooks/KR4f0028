body:
  text: 抱犢山房集卷六錫山嵇永仁撰附刻同難二先生詩文次和淚譜會稽王龍光江左嵇先生名永仁字留山别號抱犢山農其世系通顯具載家乘可考而知也先生少負才華奄有聲稱居恆以救濟民生為己任家於錫山居里近城東講堂自名其廬曰東田邑侯吳公伯成顔其額曰東田書屋嚴君中翰公與太傅范公周旋京洛為故舊交比見世多擾攘棲遲田里性恬淡不事經營先生善養志凡父所欲為與未及為者皆力為之先生孝友性成而才足以相濟所由甘旨自裕而中翰公亦得優遊林泉也先生少為諸生食餼有年噪聲名場中所為文章往往為人傳誦輒取科第已獨屢挫場屋鬱鬱不得志以親老昆弟未成室出就館榖當世知其具經濟才或聘治河或諏荒政歷有成效為廟堂所許可先生嫉惡如仇多與小人齟齬而鬼蜮含沙害之者不少先生固無恙也少曽受業於鞠存張公之門張公居江淮所稱東溪先生者是也東溪教先生為詩歌古文詞手授漢書經史諸編學殖淹博著述日富有葭秋堂詩竹林集留山堂初刻又好為填詞工北曲其遊戲三昧一種詞壇豔稱之若珊瑚鞭布袋禪自以為少年筆墨不稱意惟揚州夢頗自謂略窺臨川堂奧櫟園周先生擊節其妙云與王漢恭之想當然並傳為序以辨之且謂先生風度倣佛樊川慷慨有大志而不拘小節者也先生惡文法之徒叢脞政事出入輕重髙下其手刻集政備考一書便於仕宦給諌楊公自西序而行之先生尤精於醫蓋其始祖家本中州石首公諱適為主簿於楚有惠政小民俎豆之祀名賢祠宋州公諱穎以學士扈從南渡子姓散居吳越迄今霅川之練市吳門之蓉莊皆有傳派先生乃蓉莊之宗支也蓉莊祖塋白玉蟾為之卜地云後世當出名醫以是子孫多習岐黃業先生到處負藥囊活人疾病著東田醫補四卷江右李孝廉與偕珍於家欲代為梓行以傳世先生以數竒不偶將欲退耕梁溪之野賣藥金昌之市隱而不出感范公知遇從事於三山五嶺間束裝之日錫山邑侯吳公偕諸名流置酒聽梧軒餞之各賦踏莎行一闋以憔悴二字押韻中有孤城殘角夢家山亂帆影裏人憔悴之句先生見而憂戚歸告中翰公曰此行恐不利中翰公曰太傅舊誼何可忘促之行至署輒病以此意達之公公堅留亦和前韻以廣其意有停驂暫緩入山期哀鴻待爾離憔悴句先生勉留焉至仲春先生賦詩曰不知何事春三月剛到清明又憶還公解其意雖許之歸而未果也先生過仙霞時謁關夫子廟盟於神前曰余此行惟以救民為務若萌利欲私心願奪我嗣天地鬼神實聞斯語方逆藩潛蓄異圖先生知之每告公曰事勢蹙迫宜早隄防與其為忠臣毋寧為良臣又曰神龍見首不見尾屢以危言喻之蓋先生實為牽情慕義而至於此非昧於幾先者也不意遂及於難豈非天哉被難之日先生握手謂余曰吾輩將從公於地下矣余點首以答之先生神氣自若了無怖懼以一二言懾服諸輩之心同就於繫逆雖脅以刀鋸誘以爵祿毫不為動在犴狴中先生猶存心救世晦明寒暑筆未輟手續著東田醫補若干卷求方索診者不一而足先生嘗嘆息曰死無餘恨但醫統廢墜學其術而未大展活人之心耳又著詩二卷一卷和蒙谷作一卷紀變又填雙報應詞三十齣乃為揭公重熙死難之事其亡友袁參嵐託其表章茲聞林翁談報應事云揭公已為建寧城隍先生感而為之以報亡友其於患難中不肯負人之託沒人之善如此又在獄有百苦吟皆囑友人收藏之其囑友人詩曰此身若遂沈淪死留與寒家子弟看可喻其意矣嗟乎天豈以是限先生哉先生年甫強壯藴有經濟為世大用子二人長曰曽筠次曰右丹皆弱稚未成人然英英已露頭角天之所以報施先生政未有艾也獨是余以暮年同淪難底朝夕飫聞先生之教敷陳大要闡晰至理悲歌慷慨具由天性余之受禆益良非淺鮮謹述大略以見先生之節義文章並堪不朽誠無負於公亦無負於天也颶風和百苦吟原韻澤國秋髙信海風年年飄忽吐龍宫風神若解憐忠義吹盡寒灰歷劫中瘴雨淋霪瘴雨勢傾盆涼氣無多熱氣存布被一牀黴爛盡漫勞東閣報公孫積潦山城土竈滿蒿萊魚鱉經遊草樹堆莫嘆南天多瘴癘江河日下盡堪哀炎蒸揮汗成漿三伏期隂房偏受熱風吹如爐長日從銷鑠一片冰心覺自宜凍雪滕六天南説禍胎連年飄散浪疑猜信如今日多爭戰骸骨成丘白作堆連隂白日經旬長自扃擡頭不放曉天青何時一破重圍怨海國全消毒霧冥梅濕梅雨三山瘴霧天隂晴氣候苦相連爛衣一束供髙枕淚落殘更透破氊泥濘著屐東山座上紅遊蹤今試雨泥中喜來屐齒何妨折雙足強為亡是公昏黑夜偏油火晝偏昏毒霧凄凄斷客魂生死由來同夢覺自憐棲息遜雞豚昧旦中宵無寐枕空安輾轉單衾歸夢難唱徹雞聲天欲曙曉星落落望更殘瞭燈明滅寒檠影半黃五更餘焰照頽牆獨嗟短夜無歸夢拭盡啼痕天未光屋漏沈沈秋夜雨長懸濕盡衣單和淚穿暗室鑒臨形影對儘教點滴到牀邊濕地賓主塵蒙驟斷魂滿腔悲憤土泥溫誰云正氣堪埋滅徹夜雷霆天意存負暄當年就業水雲莊今作羈囚閩嶺長歷盡三冬寒徹骨自教含淚向曦陽旱澡杯盂貯水即為盆塵垢粗除色便渾惟有成湯解此意須教日日洗心魂蓬首老去空驚兩鬢絲蕭蕭對鏡漫披離婆娑猶足髙千丈長嘆中宵恨自知垢面消盡儀容老未還愁塵萬斛障頽顔憑教洗出來時面笑破清光天地間攣手搦管揮戈事事工鞭雲指日笑談中直教握定擎天手暫作旁觀兩袖籠縶足踏盡冰霜歷嵗寒邯鄲學步路偏難名駒一息堪千里束縛今同凡馬看拘項連環深鎖欲何憑引領青天骨自稜此法豈為吾輩設書生強項斷長繩枯腸筆硯拋殘已數年青緗圖史委烽煙寒儒雖在書遭劫藉有同心叩腹便淚眼難裏相憐淚未乾老來無淚但心酸圜扉一入同盆覆常把青天仔細看聞柝關吏巡行夜聚牌梆鑼斷續亂長街愁中但覺聲凄絶總向風波惱客懷聽砧艱難何處寄征衣未曉家山信是非留得天涯秋意苦數聲刀尺萬家機鄰哭閩海心傷刀戟場家啼巷哭盡離亡填身溝壑埋無土何用招魂向北邙風鶴道路驚傳鬬力微依形竊響是還非先聲草木皆行陳螳臂應須早見機炮警萬火鳴雷聲徹天驚聞消息走狼煙海邦莫道無防禦刮地煎砂已數年觱栗腸斷寒宵角數聲天涯凄切倍關情此身不是防邊客莫認羈囚當戍兵鼙鼓路鼓喧闐動客悲妖聲相隔暮風吹他時若駕歸舟急搖曳中流弄幾槌笳吹凄絶中宵客淚寒傷心笳管夢難安征人莫作回頭望南北相思苦萬般吏稽難裏羞將面目呈福堂苦盡羽毛輕吏人不用多稽察青史將來識姓名卒獰鬼物三年迭作羣畫圖水陸日紛紜他時若現輪回相只恐閻浮我是君晝詰紛紛邏卒守街衢老廢無聊泣向隅舊僕門邊供菜食傷心淚眼看糢糊夜查猙獰燃火到牀間叫應分明上鐵環吾輩不為無義漢儘教狼籍鬼門關值班何事同舟趁逆帆往來相對鬼巉巖朝眠暮起多拘束獸語禽聲口自喃交更蠻音攪耳夜嚌嘈情面無從假半毫捱得愁中更漏慣犬鳴雞唱笑徒勞臭蟲引類潛身浪蕩遊尋香逐臭雜相投已教吸盡人膏血不放餘情到白頭蟣蝨捫蝨青山樂可圖談兵定霸亦相須當年壯略推王猛蠶食今知飽病夫飛蠅舊聞沈獄雪飛蠅今見蠅飛倍可憎莫道秋風吹不到腥膻相逐逞何能遊鼠唧唧啼飢竄黠鼯虀鹽淡薄罄盤盂誰教白晝爭人食搗穴難存社屋軀聚蚊湖傍秦郵草聚雷露筋曾拜廟容來難中莫説今偏苦耳畔聲聲似訴哀鬼啾鬼作嚶啼夜氣森難中猶現宰官心蓮花法裏容超劫不怕沈寃萬丈深疫癘災氣流行天意乖形如土木命如荄何當請出醫王手莫學劉伶死後埋碎衣無分繁華原憲貧身僵半褐幾冬春形骸粗足供顛沛莫問悠悠衣我人破被炎方一雨便秋來敗絮蒙茸暖氣回羡却五更清夢裏還家更熱獸爐灰砂鍋鑽燧燃薪勉可為晨昏饘粥壁煙炊泥砂亦有調羮用委棄人前總不知泥爐老來事事想安然搗土為爐爇作煙被底不愁魂未貼長宵抵足任髙眠瓦盆泥缶聊存古朴風殘湯冷飯幾曽空有時擊得嗚嗚響驚起同牀磕睡翁草褥肌膚皺疊浪成痕藉草為茵事可論冷暖不知人老去飄零一似蔓無根敝履兩足龍鍾力不驕雙鳧家製著來遙多情東郭還相愛送與先生踏灞橋木枕一枕羲皇不可安昏昏何日醒邯鄲夜眠莫作繁華想於我浮雲世路難篾筐食物無餘饒菜羮紛紜雜貯未能清此筐聊且充香積方便兒童荷擔輕竹刀寸鐵難持聲息嚴庖童刮竹製魚鹽叮嚀留與歸途用當作牙檣驛路籤草珠維摩方丈昔藏修逺到三山苦滯留何用牟尼珠百粒菩提方寸內堪求油箑燈煙土竈爛如星六月朝昏坐火亭聊藉清涼驅溽氣蠅蚊一一手能經惡紙著書憂憤事難成欲寫窮愁愁更生何日雲煙供一掃桑皮剪破兩三籯臭墨隃麋研透色青藍膠味薰蒸油氣含怕向故人酬白雪煙煤紙上恐難甘敗筆羊毛一束價連城信手聊成泣鬼兵拈得新詩同史讀也知直道腕中擎磚硯瓦胚作硯墨朦朧煙霧和來泥上鎔鐵石磨穿為廢棄悔教銅雀代耕農殘書竹笈藤箱走蠧魚風塵千里爛圖書縱教攫去成何用覆甕無多灰燼餘炭痕灰蹤桴迹血絲垂珠玉龍蛇和淚揮親手投來同拜讀雷風震疊數行詩塵灰三年怨恨積生塵説與誰行整頓新汚垢寧教都掃盡不將清白讓他人煙眯爨火如星旦暮燃難將怨氣達蒼天耳昏目炫等間事惟待消除鋒鏑煙乞水貧來一勺不成烹坐向爐頭作嘆聲掬得半瓢猶德色文園到此更傷情覔火冒突衝煙海國城半天劫火怪秦坑何人為設伊蒲供重熱爐灰煨蕨羹摘菜菜株剔淨草連泥葉葉根根釀作虀為想遺黎多此色焉能一一手中提執爨求人水火亦維艱疊喚千回童子頑只當老僧棲破院煨茶啜粥自相關食淡年來氣味淡相尋苦菜酸虀亦費金連月併教鹽食斷嚼然何意作長吟縫綻臨岐無母倍傷心針線全疏耐至今補得冬來春又破可憐瘦體不遮襟浣衣薄浣艱辛訴向誰懷新去故力難辭洗來垢膩湯如漆錯認烏盆似墨池滌器圜扉滌器體無褌司馬情多繫木根留得盤罌滋味好不教塵土咽飢魂粉粥老性安和粉作糧蔗霜調得熱充腸旁人笑問何方物倣佛胡麻飯味香餕宋木飯自笑飢軀汗漫行祗今枵腹向誰爭大烹無福堪消受隔宿餘糧百味生栁茶垂垂緑樹即為家未到清明摘嫩芽浪説盧同堪七碗武彞夢斷雨前茶劣酒結伴髙陽興不無形骸桎梏酒腸枯故人買得常分飲一陳酸風透瓦壺缺藥嘗來藥味總成虛真則無多贋有餘試向懸壺頻盼望看看愁煞病相如書傭眼穿三載寸函書那有家鄉舊雁魚童子膝前來問字寒暄寫就意躊躇醫匠破帽殘衫海上方此中真假費參詳惟君肘後多仙訣冷落籬邊菊蕊黃蔽席寒風淅瀝打牀頭桑土聊為蓬户謀折就蘆簾遮半席蝶魂栩栩夜無憂篐桶器物皆從破裏來竹皮木片有成胎一文不吝還堪用始信人間無棄材糞草積汚藏垢日成堆掃到何時掃得開自是亂中羅網密獄無青草也無苔穢厠紫姑夜降掃須勤百畝農夫去惡氛但使生民無穢濁何妨野老鼻風薰溺器不禮儒冠舊日情朝昏穢息遍牀楹牛溲馬勃非無用醫道於今學漸成惡夢凶吉無憑事若何神思恍惚願蹉跎昨宵夢見風波險只向髙牆禱孟婆元旦抱悶窮冬望早春依然蒙難一孤身故園最足傷情處此際庭梅花影新清明曉起愁聞杜宇聲傷心節候又清明誰知瘴嶺三年别猶作他鄉患難人至日陽九艱逢網未開到今候轉一葭灰循環有序春將至遙想家山夢幾回除夕牢落炎荒嵗月窮鬢華狼藉任飄蓬弋人羅網聞猶密誰作傳書塞上鴻撫棺死歸撒手便稱能生寄騰身悵未曽莫向鬼王誇讀律不知何例脫寒冰客俘相逢爾汝盡南冠敲骨鞭皮總淚酸何事風波爭入網翻身隨處可平安老親八旬窮父病牽衣愁子危方效力微囑道老軀猶健飯三年可待順帆歸昆弟無兄無弟久離家棠棣關情悵落花子姪偷看堂上健豈知懸淚望天涯憶內絲絃未續舊時纑老病天南嘆獨夫同穴細君無念我殷勤泉下奉慈姑思兒母亡父逺子孤零爾輩無成及壯齡讀我殘書無散失待余蘇難到家庭同宗永柏家聲清白嚴詩書聚族學深潛當時記得歸家笑道我三年幕府亷受業髫時學古習韓蘇許我潛心出衆徒海國三年成夢寐空勞老眼識迂儒同社名流帖括揣摩深願比他山感士林同學少年頭白盡浪遊辜負下帷心故恩圖維報德老成翁落拓天涯患難躬嵗月拋殘無壯志獨留方寸感無窮舊遊念舊金陵别會稽雨花臺畔曉風迷煙霞到處堪遊賞莫向三山聽鳥啼祭墩枯木從來説有靈仰天貫索豈無星滿腔赤血行將灑答爾椒巵一炷馨告神不怨青天呼應髙神靈三尺頌臯陶知君直曲無偏枉何不從公雪俊髦颶風和百苦吟原韻雲間沈上章撼海摧山鼓烈風蚩尤似欲拔蛟宫分明天意同人意好挽危檣黑浪中瘴雨朝來驟雨已傾盆城郭煙消幾户存最是濕衣烘未得老天寧不念王孫積潦連宵風雨長蒿萊隂霧迷離丹嶂埋禾黍漫漫愁望裏千村煙冷亦堪哀炎蒸為霖為雨拂前期馬勃紅塵遍地吹心境清涼揮汗少火雲如蓋總相宜凍雪凍裂肌膚煉玉胎炎方風景費疑猜雨晴寒濕渾無定怪指兵荒是雪堆連隂海雲日日鎖幽扃不見三山草木青直待薰風來解愠笑看皎月破沈冥梅濕鄉夢難成怫鬱天頽垣赤體夜牀連隂雲熱氣相鎔結暗灑花斑漬舊氊泥濘望斷關山淚雨紅不堪蹂踐夏臺中騰身灑脫塵埃去屐齒逍遙訪逺公昏黑暮笳悽咽正黃昏無語空憐杜宇魂鄉國不知身尚在清明為我買雞豚昧旦婦子晨興憶問安貧家菽水定艱難鳴雞聲裏空流淚剩有絲絲鬢髮殘瞭燈髙懸燈火照昏黃瘦骨稜稜倚短牆一枕覺來空憶舊紗窗辜負日頭光屋漏宵來點點似珠懸濕透鶉衣帶淚穿海國只今多旱稿如何不灑麥苗邊濕地子夜誰能貼夢魂如冰似雪卧難溫餘生糞土尋常事贏得伶仃傲骨存負暄步簷忍凍憶山莊空有春風道路長冰雪久埋憔悴甚倒扶藜杖試初陽旱澡簷溜盛將水半盆湔除塵垢不嫌渾泥塗自喜肝腸潔夜夜清泉濯夢魂蓬首拂面拖肩鬢已絲短長梳就復支離愁來尚憶同心綰兒女閨中只自知垢面癯貌何由得大還丹砂未轉且鳩顔憑他冷暖隨時去面目重光談笑間攣手握槊爭如草檄工持籌未展笑談中當場欲吐賓王志袖手偏將雙腕籠縶足立雪棲冰頗耐寒家山何處夢艱難平生未著王喬舄徽纆何勞著緊看拘項榮辱皆忘義足憑錚錚強項不模稜艱危百折冰心在留與兒曹作準繩枯腸半豹徒窺壯盛年肝腸如雪氣如煙苦吟只為消愁病敢擬邊君話腹便淚眼滴滿春江淚已乾每逢時序倍心酸隂房未得瞻天日昨夜家山夢裏看聞柝刁斗虛張挨號牌兒童徭役也巡街亂敲鈴柝無倫次慣擾思歸夢裏懷聽砧誰家夜夜搗征衣夢裏家山醒又非寄語沈郎憔悴甚腰圍莫織舊時機鄰哭赤子何辜暴戰場驅他鋒鏑昧存亡可憐少婦嗚嗚泣空自招魂向北邙風鶴寄托乾坤一葉微乘風破浪事全非驚魂已作傷弓鳥悟透人間禍福機炮警轟雷新試火連天不斷傳烽遍地煙誇盡戰爭雄海國野人還憶舊豐年觱栗曉風吹徹枕邊聲動我家山牧笛情滿地干戈愁望裏問天何日得銷兵鼙鼓誰辨宫商音律悲鼕鼕聲響競鐃吹正平若使生今日節奏鏗鏘撾幾槌笳吹一聲吹遍海天寒南北征夫豈兩般浪説封侯懸印易萬金難買信平安吏稽獄吏尊嚴較簿呈此身萍寄羽毛輕吾曹氣節殊周勃著甚施威髙唱名卒獰小醜么麼結作羣揶揄惡態故紛紜懸空雖少軒轅鏡劫火場中半是君晝詰網羅麟鳳逼街衢鬼窟南方説海隅草木皆兵防範密晴天好日也糢糊夜查恩仇細數笑談間銜結都忘草共環惟有夜來查鎖鑰彼呼此應頗相關值班天南日日盼飛帆未得長風困石巖黑浪頽波顛簸慣去來鷗鷺枉喃喃交更擊柝巡風徹夜嘈輪番交代按纖毫夢中我自還家樂蠢爾蜉蝣何太勞臭蟲時候昏黃結隊遊瞷人醉夢暗相投覺來抹煞還餘臭笑爾橫行著佛頭蟣蝨景略胸中具壯圖笑談當世偶相須傲他混濁同魚目捫搏誰能識丈夫飛蠅尋頭撲面笑飛蠅欲玷連城不自憎逐臭營營惟附熱天涯冷處失君能遊鼠啼殘丙夜集飢鼯嚙盡黃虀覆粥盂祗顧貪叨供一嚼跳梁驚夢上人軀聚蚊結聚成團聲若雷幾回撲散又飛來芳名千載稱筋露蒙難書生未足哀鬼啾沈沈殘柝夜蕭森似訴如悲動我心三載為鄰頻喚與慈航度爾黑波深疫癘調燮非關天意乖福基禍兆有根荄明知瘴雨蠻煙地多難多愁志未埋碎衣捉襟露肘道非貧憔悴支離已兩春為憶機中麻苧婦裁成白夾待歸人破被苦雨凄風捲地來摧殘弱質氣難回老翁贈我黃花絮一線微陽撥凍灰砂鍋豆粥虀鹽何計為壁間土釡起寒炊家居最慕調羮事難裏聞韶味不知泥爐鎔成造化火初然泥竅中含數縷煙一枕乍回猶未冷五更霜重不成眠瓦盆朴陋堪追太古風滿盛藜藿不愁空行將攜此江南去老作田間鼓缶翁草褥髀肉磨穿破薦痕氍毺翡翠那堪論卧薪待畢前生業石上三生話宿根敝履天涯空憶馬蹄驕芳草遲遲歸路遙不逐世情輕敝屣好留穩步廣陵橋木枕圓木牀頭卧不安空煩授枕説邯鄲此中若有光明隙倚傍仙家去不難篾筐苜蓿盤飱只菜羮愁中滋味亦香清最嫌鼠輩空勞攘筐筥如城莫視輕竹刀禁網繁苛獄吏嚴竹刀切菜食無鹽割雞製錦何曽試信手如抽鄴架籖草珠恐慚衾影昧身修草載禁持過少留不是餘生重佞佛恰如瞻母望中求油箑赤帝初懸大火星臨風避暑想荷亭元規塵在誰為障手撲粗紈也慣經惡紙紆籌脫稿惜無成欲寄牢騷慰此生十萬錦箋書不盡殺青塗遍已三籯臭墨金精玉髓結深藍吞吐虹霓彩氣含猶是當年磨鐵手如何此墨寸心甘敗筆偏師攻破五言城淪落羞誇筆陳兵定逺當年非浪擲也因穎秃不堪擎磚硯案頭銅雀想朦朧滴露研珠墨氣鎔拋向亂軍何處覓於今瓦礫伴耕農殘書卷軸藝香辟蠧魚半生鄭重幾行書亂來手澤輕如土拋盡青緗痛有餘炭痕彪炳丹心千古垂才看煤迹淚頻揮此情天地真堪老報國憂民一首詩塵灰罡風吹動屋梁塵席地千回拂拭新暫學面牆存故我不教蒙垢笑旁人煙眯昧旦寒灰燼復燃不知門外日升天迷離倦眼開難看認作金爐裊篆煙乞水解渴思將蟹眼烹西鄰聞有轆轤聲強為顔笑從人乞不負殷勤一勺情覔火閩南原係祝融城况復沈淪在火坑夜雨炊煙消歇盡向人覓取作調羹摘菜不摘旁枝但剔泥青黃造出兩般虀三飱飽啖聊充腹滋味深長莫漫提執爨煮菜烹茶豈憚艱三年習得面皮頑問他冷暖旁觀者痛癢飢寒竟不關食淡鑄山煮海計千尋商算全操鹽似金淡味略嘗天地闊不留煩惱只行吟縫綻綵線金針教子心素絲易染佩于今臨行多少牽衣意補綴年來淚滿巾浣衣滌垢除汚説與誰萬千艱瘁未嘗辭洗來顔色還清白勝入蓮花不染池滌器窮途阮籍一竿褌笑傲安能免俗根我欲臨流濯萬里幾時白水可招魂粉粥陳蔡當年病絶糧炎方今日亦空腸一甌漫抵回生藥始信農家麥飯香餕宋木飯餿酸腐米氣流行撒向庭階鳥不爭耐取飢腸應有日大官留饌待書生栁茶千泉泖水足山家柏子初燃試紫芽我愧盧同耽此癖難途栁葉作新茶劣酒破囊羞澀一文無斷酒三年腸已枯昨夜老翁憐我病沽來村釀未盈壺缺藥歡少愁多氣脈枯病來藥餌欠贏餘茂陵渴症年年發説與文君總惄如書傭老兵出紙倩為書欲寄平安雙鯉魚聞道近來烽火急從旁搦管也踟躇醫匠醫國空懷海上方順時調氣易周詳蘇民自有清涼散能起瘡痍菜色黃蔽席甕牖繩樞尚白頭資身清蔭愧無謀三年遮得風多少步障如斯暫免憂篐桶貯水煎茶買得來需他完節合胚胎補鍋篐桶皆遺老藉手周旋有用才糞草暮暮朝朝積幾堆箐篁縛帚掃難開漫誇一簣能千仞肯使汚泥覆緑苔穢厠呼童蕩滌莫辭勤穢氣能招疫癘氛幾載浮沈同混濁仗誰三沐復三薰溺器患難淪胥見世情裸裎氣味逼房楹向人穢褻曽無忌蝨處禪中慢老成惡夢鄉國迷漫可奈何黃粱幻境日蹉跎至人清淨雖無夢指點盧生心亦婆元旦嬌鳥初啼報早春南冠羈客未騰身凌晨覽鏡餘清淚惟有寒霜白髮新清明風送啼鵑不斷聲忍看春仲值清明何時返里依宗祖聊作東郊掃墓人至日愁懷萬斛鬱難開誰向人間問劫灰白日今朝添線影履長全擬一陽回除夕千磨百折五般窮瘴海沈淪類轉蓬此夜悲涼家萬里夢魂何處返飛鴻撫棺哭君共事怪君能報德酬知惜未曾只恐夜臺猶故態悠悠泉路總寒冰客俘道路時時是楚冠流離老幼鼻為酸山僧未免充俘數似我長羈分所安老親慈母親縫遊子衣臨岐囑付見幾微倚門淚眼糢糊望鱸鱠蓴羹何日歸昆弟善養髙堂學作家間時培灌紫荆花更須敬嫂還憐姪切莫輕提海水涯憶內菽水艱難藉辟纑不須裁剪寄征夫買書勤與兒曹讀教子承顔善事姑思兒想到依依淚暗零汝冠諸弟尚髫齡一經莫把韶華誤侍祖強於趨父庭同宗友愛同遵祖訓嚴留餘堂內戒心潛英姿入夢心猶痛彭澤歸來裝自亷受業千秋知已説歐蘇愧我才非金馬徒風雨雞鳴情至重傷心隔世嘆先儒同社意氣相期河海深九峰初地結文林驪歌共灑臨岐淚敢負垂髫金石心故恩鬢髮婆娑念老翁殷勤勉勵佩微躬分資餉母敦明發報答瓊瑶奈困窮舊遊東泛金陵南會稽張帆舊約草萋迷長春宫裏閩王樹滿地凄涼只鳥啼祭墩朝看暮守豈無靈也識胸羅斗與星雀角鼠牙收拾去臨岐為爾薦香馨告神氣未飛揚足未髙顛危心事付臯陶餘生自分酬知已一任張羅困俊髦抱犢山房集卷六
