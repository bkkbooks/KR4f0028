body:
  text: 抱犢山房集卷三錫山嵇永仁撰譜和淚譜并引和淚譜者中丞公處患難中以炭畫壁所為作也何以取諸取諸文信國只恐史臣編不到老夫和淚寫新詩之句也閩難之作或者議之謂公粉飾太平則有餘戡定禍亂則不足此語似是而非甲寅之難非自公始乃軍國醖釀之禍自公而受也公未蒞止先有蠢動機及公以孤危之身履盤錯之地文武不相熟兵民不相習孤拳隻掌支撑於虎口狼尾之間雖謀勇百倍人亦莫能有濟而况牽制功令束縛例條安敢輕棄封疆蹈罪履禍而為行事便宜之輕舉哉公被執時大罵求死不可得餓十日水漿不入口求死又不可得僕輩因勸之堅子卿之節俟天兵聲罪致討目擊賊首受誅亦快心事但忠孝節義操之自我生死禍福聽之於天一旦依稀泯沒不能如草木之留根荄於人間傳聞失真紀載少實非所以砥世道回狂瀾也故於公詩互相酬和復撰和淚譜紀同難諸顛末以略存其梗槩云抱犢山農識和淚譜一耶溪先生姓王名龍光字幼譽七世祖居淝水之柘臯村明初隨大將湯和經理東南愛㑹稽土地秀美擇而居之相傳世有讓德至今里名讓簷蓋以此也髙祖家素豐能濟人緩急鄉黨貧乏者多資之曾祖由明經通判粵中政有惠聲嘗白盜案之寃者却夜金不受其人尸祝公德於罷官歸里日尚匍匐而謝以故子孫忠厚清白皆由家訓所致先生降生時其祖母夢見髙曾吉衣冠來家醒而燈火熒熒視之則坐草矣私卜先生後必貴勉之讀書補博士弟子屢挫場屋不得售同胞三人伯仲早棄世先生中道喪偶生子三長垂謙邑庠生次垂訓季垂謐悉馴謹工書史數十年以來家漸陵替先生不樂處蓬卷有四方之志慕秦中山川雄盛古帝王將相碑冢存焉為驅車遍厯倦而言歸時年已五十餘矣范公撫浙延置絳帳教其愛子課誦講解之外一室寂如先生不與人較長短競得失抱璞守琛如木石然所以儇薄妒害之客多容之而又性甘淡泊不自言其窮苦於是家道日益窘范公督閩念諸客中惟先生無闕行敦迫偕往先生為嚴父春秋髙逡巡膝下父曰范公有德吾越不可悖之老人筋力粗健桑榆無恐汝第往毋內顧也先生在閩視余加厚有故人之誼蓋自浙聚首以至於今耳被難時狰獰者張弓矢荷戈執殳驅之而行如就西市狀余與先生攜手緩步雖咤叱不之懼私相謂曰余兩人氣誼頗同死之日願魂魄聚一處先生曰唯唯公撫吾浙請蠲請賑救活父老子弟億萬口余以一身代越人報之又何憾焉余壯其言而幸死有同志泉下不寂寂也是刻天光慘淡日氣昏濁余輩處亂尸血窪中俄而迫至逆邸擾攘之頃脅余輩草安民檄不從誘以官爵又不從觸其怒而械繫之俄有李明經者受逆命說余輩以筆墨從事余輩極口唾詈又堅拒不之從是以幽囚兩載而至於今先生在獄無憂愠色日惟歌詠怡情著養花說一帙賦詩五十餘首有岑嘉州髙達夫丰裁倦即偃卧最喜余所著百苦吟夜則髙歌一闋已而四壁有嬉笑者有怒罵者有悄然悲而淚下者以此為常先生雖瘦損骨立而無疾病亦由其懷抱曠逹耳所稱達天知命之君子殆其人歟和淚譜二林可棟宇能任福州閩縣人宋文昭公裔年六十九寡母張氏在堂苦節五十年今已九十三矣翁長子入庠早世繼娶何氏甲午孝廉琛之姊生季子文燾䀻癸卯孝廉徐允登女未娶先有妾姚氏生仲子文熹已娶鄭氏女翁少時棄舉子業學吏事厯練敏幹具活人心明末時由太學生授以職辭不仕翁知天意有在避跡鼓山欲剃髮從浮屠遊提督楊公開闢閩疆熟悉翁賢寄以帷幄軍興擾攘之頃翁不得已應之時山海交訌桑梓鼎沸翁居中多所保全總制李公初下車延翁座上咨以機宜翁在軍中至誠區畫瞭如指掌李公亦推心置腹信任不疑讀樹滋堂集其間如却紅夷請居內地罷勦海無益師旅以及開海復界諸條議皆非經生所敢捉筆更難者保孤於遺疏之中翁真報知己於存亡矣翁與遼左侯公善侯公曾宦於閩與翁從事戎行雅重其人每言於范公公信而禮䀻焉許御史視鹽兩浙將備舟車迎之侯公謂翁曰范公為救全閩瘡痍而來翁獨不念鄉黨赤子叩翁聞其言感激淚下堅留不去余每見翁條析疾苦事反覆太息嘆為仁人君子之用心數為公稱述公不以余言為謬有忌之者造為鬼蜮語亦不敢入公耳也難作之後鞫者窮究章奏事將罪余余曰死何懼但願得一見范制府死亦瞑目時翁獨為主者呼入殿中訊之知余不免慷慨相向曰余老矣死固其分豈忍使目中見殺才士哉願以身代嗟乎嗟乎鼎鑊在前刀鋸在後此時且有多方卸罪欲苟活其軀者翁獨奮不顧身如此彼人面狼心險惡排擠之徒寧不慚聳汗下乎翁於被難夜密謂余曰公死我輩誓無獨生理不如早相從於地下也隂以鐵鎖捩喉頸舌吐寸許而手軟不自支遂復蘇余以手足拘攣逼摺緊密竟無死法邏者張燈火環而察之乃相對哽咽而已翁在難中遺囑其家不作一酸鼻語且以今日之死死於名義為幸翁真達於生死之際者哉和淚譜三沈子天成與余同幕府但知其為華亭人敦氣節重名義者也而不知其世澤淵源家聲光大蓋沐浴忠厚之深而負隱痛焉嘗揮淚為余言曰僕本姓俞名積治字端初先世秀州人居武塘嘉禾里九世祖文莊公諱綱以諸生從龍與李善長諸公同入閣有謹厚聲自是代有聞人曾祖諱玊鼎嘉靖朝由明經為大興縣丞遷松郡司馬防海禦倭有功歿於官留葬城西斜塘橋左郡人德之祀名宦祠祖父因家焉祖諱仰溪太學生事母孝捐資賑荒收葬飢殍著十生訓愛周易積善之家必有餘慶尚書慎乃儉德惟懷永圗四句為子孫命名著家訓垂戒謂寧愚毋巧寧讓毋爭生八子父行四諱香林字雲槐重名節寡交遊晚年好種花兼學佛積治生十二年父見背嫡母王氏沈氏繼亡十三齡遭家難隨生母徐氏攜幼弟妹居舅氏沈公來家舅氏撫余頂曰他日成立當繼父兄志因改姓沈更字天成拮据家務完弟妹婚嫁遊京師思博升斗祿養母氏慰祖父在天之靈兹從范公罹於難死報知己固其宜豈彼蒼不欲延俞氏一脈耶言訖又淚下余聞其言而不勝嗚咽也仁人孝子不自薄其根本而後能急人之難不自墮其家教而後能成人之德聞變之日干戈擾攘沈子謂余曰公生死未卜遽以身試鋒鋩葬亂軍手中無益姑避之余曰留子在為余輩收骨歸葬故里未為不可沈子避三日夜俄聞余輩死信禱雷雨中願出踐然諾為悖義者所縳獻於逆邸時鞠者正窮究章奏事將罪余沈子厲聲曰范公一生光明正大無隂圗人之念公且無他與書生何涉此細人卸禍之言也豈可憑信逆見其抵牾不屈遂并繫之幽羈一處然後知公及余輩尚存也沈子與余同寢食疾痛關切相依為命有反噬余者則批其頰而詈之愧之鬼怪乃逡巡辟易膽落而止余輩每聞公起居無恙則私心喜或聞其抱病食息不如常則吞聲終夜飲泣蓋二三子與公為存亡者也沈子著書一卷名聽鵑集花譜一卷載種植之事甚詳皆在難中所著述元配朱氏生四子善標善棟善棠善棣讀書於家皆稱醇謹沈子善周易卜公與余輩終且沈淪難底嗟乎光前耀後之事不能不有望於其四子也已抱犢山房集卷三
