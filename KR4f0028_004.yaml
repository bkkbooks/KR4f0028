body:
  text: 抱犢山房集巻四錫山嵇永仁撰雜詩夜泛西湖日暮歌船歇澄流杳若空倒峰湖氣上孤櫂月明中聴曲憐司馬題詩憶遠公鄂王墳畔樹一夜起秋風韜光寺次香山原韻竹路循危磴神仙此是家池流千古雪山放九秋花撥草尋苔碣支笻觸筍芽因僧聊借憩還試早春茶少年行年少嫻弓矢從戎久不歸一朝返故里夾道生光輝馬勒裝金軸魚腸挂鐵衣還看舊相識白首尚寒微渡錢塘清曉上江船江空細雨懸落潮沙氣暖擊楫鼔聲連鳥雀衝林起魚蝦出網鮮萬峰纔透色入望忽雲烟越女越女習勤苦家家盡飼蠶攜筐來道左采葉過城南朝露常多畏春風獨抱慚趙王殊不識妾意比澄潭石門落日石門近離懷苦未安人烟爭入浦夕鳥倦啼寒歴歴吳江盡悠悠歲序闌不知霜月下猶作故鄉看曹秋嶽司農倦圃愛客司農性花開不閉關搆亭秋水曲把酒夕陽間人事無心絶嘯歌恒自閒南湖有鷗鳥應識謝東山家爾遐兄招過嚴陵一自之官去翻令㑹面疎紆迴千里夢驚喜數行書釣渚空啼鳥青溪淺漾魚憑思好風景行李漫躊蹰春日出睦州城遊北髙峯寺淺瀨晝鳴榔春風觸緒長雲中連墖舍山半壓城牆野火明樵路宵鐘下佛堂釣臺何所見烟月晩蒼蒼富春江春寒三月盡風雨富春江一線分天影千峰赴海幢重雲飛瀑布巨浪撼蓬窗髣髴精靈過歸心逐此降送徐子能歸芝山作客爾先歸還家霜雪飛病中搔短髪歲晩惜斜暉想到梅花日應開處士扉故鄉有耆舊寂寞尚堪依呉江夜發忽覺夜風至開船夢暗驚漁燈猶未滅江月正初生越樹崇朝色呉門昨夜情相憐遊子意過雁寂無聲寄家放庵兄達夫真好學遲暮乃知名莫以户庭累重牽婚嫁情問年將五十讀易曉生平有子如徇外買田須勸耕凉谷著書常早起春日隠蒿萊山氣不可觸柴門猶未開落花摧細雨啼鳥戀空臺且莫斂懷抱餘寒縱酒盃曉發燕子磯風雨亂雞鳴披衣正五更危磯吞水面疾櫓裂江聲塞雁一惆悵沙鷗相送行明時羞獻賦誰與念生平野火薄暮微烟起山家辨火光夜珠時上下神館暗蒼黃谷口停樵客溪邊掩夕陽王孫莫歎息春草未曽芳虞山省楊子常表伯鄉居三十里城郭不相聞園内馴禽鳥門前足水雲清尊邀入夜白髪喜談文若問謀生事春田草未耘秋夜虛堂復何事入夜但聞鐘送客還茆屋攜琴就古松清陰生暗壑凉月上髙峰坐覺林香滿巖花開幾重送顧見山河道赴都門畫舫出雲間閶亭暫取閒離家前夜月對酒故鄉山赴闕非懷祿乗時欲濟艱長征遥計日秋水正潺潺秋日再過嚴陵作客易悲歡秋天又早寒雲山常寂寞世道自波瀾暫住梁鴻里重來嚴子灘風霜羈旅色不敢鏡中看平望一氣自蒼灝難分呉越天鳥隨楓葉下帆帶夕陽懸古驛深苔碣横橋鎖暮烟兵戈猶未歇飲馬太湖邉旱赤日無雲氣長風四野清祇求凉雨過不敢計秋成簷燕侵晨出山蟬競夜鳴那堪郊外望處處桔橰聲休休庵同梵林暨師巢舍弟月明須放飲難遣是殘冬有弟知艱苦攜僧共懶慵燈昏長對佛霜冷不聞鐘遥憶砧聲裏寒衣授幾重髯僧述雲臺名勝户牖生遐矚登臨說過來兩峰低日觀諸島拜雲臺晝沐魚龍氣宵聞鸞鶴哀老僧親見後三度碧桃開湖心寺湖水浮千頃春流沒半篙石屏寒漲汐烟樹障波濤寺有耕田利門無送客勞山厨薄滋味四序剪溪毛送何大左車還白下時留浙署湖水沈沈綠煙花泊小船到來春繫馬歸去暮聞蟬親老難為客心知恨各天也應常送别怕向酒樓前其二迴憶家園勝山陰道上多扁舟離越館明月滿吳歌舊事尋桃葉新詩詠芰荷烟雲如落紙換得右軍鵞其三九龍峰影下逺逺一帆張敝里當溪岸東城有草堂聴泉還獨過看竹更誰將川陸雲陽便休嗟江路長其四白髪江南住年年菽水虛歸囊懸負米截竹慣盛魚君去麥秋節途逢轅犢車平安賴傳達堂上病將除其五年少應徐輩竒才吐夏雲柯亭知者少鹽櫪歎為羣且重許身節毋求先達聞柴門秋爽下散帙倚斜曛送唐祖命入閩烟雨武林秋相逢上酒樓征車無滯跡明日更行舟星出三山沒雲歸五嶺浮羡君垂白髮物外任遨遊王于一自崇川至又送其過江上山陽同避亂孤棹過崇川家累移湖上詩窮自海邊空城千隊馬落日一聲蟬君問江東路曽留幾井烟竹外驚看盈尺筍翠影到柴門出土雲霄氣瀰天風雨痕鳥聲如隔澗人跡不成村賴有田間叟乗閒共把樽東園訪張三牧公延陵船未泊到即叩東園野客不知路蒼頭方候門他鄉家已破老母齒尤尊艱苦良朋意為言雞黍存琵琶女養兒不識字教女學琵琶一撥勝越艷再彈過呉娃日供三斛黛夜買千錢花不願入朱户願從豪富家京口訊潘江如亂後家園在天留處士貧入城看敗瓦居巷寂無鄰水活宜栽栁山低好負薪齊門難鼓瑟歸老著書人泊舟太湖是日即解纜預儲今日酒暫歇雨中船湖氣涵煙草人家傍水田石衝垂釣路烏沒挂帆天聞道越江好此時應采蓮聞梅杓司歸敬亭客自白門過知君返故廬鄉關兵火後山色夏秋初雞犬舊司宅田園重買鋤是非江海上避患學潛魚五更五更喧市船伐鼓祀靈祠水急星如掣帆開樹欲隨塔光垂羃䍥漁唱起漣漪獨有滄洲思白鷗知不知晴閒門多積翠燕雀喜新晴四月榴花滿一天秧水生溪光圍破寺草色露東城縱有樵人過牛羊不受驚涇溪暮泛至湖口放船溪水曲引纜問田夫返照上簷瓦秋聲入蟪蛄潮來袁術墓月動汜光湖誰為捕魚往因人呼釣徒雪霽放舟答雲子見别詩蹤跡悲浮梗雲山倦采薇離亭一樽酒客路兩重衣雁字霜中斷梅花道上稀淮南風雪後我獨掛帆歸東臯主人留榻草堂懸木榻燈照不眠人獨樹聴殘雨寒塘斷比隣静知交道薄轉覺酒徒眞明日江東路波濤愁問津有贈白髮牆東叟天明獨灌花豆藤牽爨室苔蘚上漁槎月落留殘魄雲晴變早霞此時逢客到尤喜斷鳴蛙談長益留楚中未還江聲寒白日環抱野人扉一自出門去空巢有燕歸依槎潭影動投館夕陽微不有登臨者天涯誰息機拳石臺天青入孤望怪石卧層臺樹密朝無雨溪深夜挾雷艤船驚白鷺掃地落黄梅遥覺峰巒到東南霽色開石塔院哭潛江劉學士著書期後世夫子竟先徂可嘆黄花節傷心白社孤人間空手澤地下辨歸途蕭寺秋風裏門生泣向隅買魚寒月明絲網攜錢買活魚雲歸雙岸出星落一潭虛沽酒誰為對題詩只贈余風波最安穏湖上可茅居防兵移至石塔介公過白門矣石門猶古刹戰馬牧迴廊燕子不成壘春風何處翔上人遊故國錫杖挂空房幾見殘僧在停鐘麥飯香觀獵青草郊原外黃沙日氣蒸驕風嘶怒馬健臂立飢鷹細栁將軍過窮崖獵士登槖駝垂野獸鞍上月輪升與寶月庵老僧三載不來此老僧意尚眞聴鐘無别事沽酒莫相嗔月亂風前栁溪生雨後蘋入吳傷逆旅不信是呉人家巖若移居峴山峴山新買宅兒女就桑麻薄日東隣樹寒風處士家力田餘飲食養母惜年華莫更驅城市南方正鼓笳采葛何必思公子難忘采葛情宿根在逺澤新蔓過前楹黄鳥復來喚朱顔空後生鄰家女不解月夜獨調筝周二為荷亭醉向荷亭宿荷亭荷正妍秋蟬非一處暮栁盡生烟草藉陳蕃榻門通范蠡船主人邀更酌不敢逞髙眠贈龔半千江南一老丈破笠伴孤笻䢴水且浮宅鍾山無老松挂琴聲滿壁待客黍加舂買隠何年事閒圖江上峰野泊野泊沙堤暮迴風荻港生鳥歸京峴樹山鎖潤州城石怒潮相狎魚寒夜不驚二更難就枕江月太分明秋思落葉滿秋林秋聲不可尋髙樓有思婦夜起彈瑶琴越國海雲變呉江烟水深輪臺千萬里何日罷笳音同孫豹人泛雷塘沽酒出城外來尋漁父家借船經夏浦帶雨看荷花水漲蛟涎冷風香燕舞斜美人撤錦帳日暮弄琵琶同友人出郊外便作揚州客寒濤不可聞有家皆逆旅出郭喜同羣蜀井前朝蹟隋宫新鬼墳隔江烽火後移駐水犀軍寄張淮山吏部遥憶釣魚臺園林向水開清風一下榻明月共銜杯野鶴時相過閒鷗亦往來昔年此風景繫馬獨徘徊屏風山寺後山光近通明一竇懸陽烏中外景桂魄往來圓孔雀張雲翼芙蓉列漢天蒼茫靈氣厚知與岱宗連登影翠臺望泰山嶽氣撼虛空登臺自不同千峰遥枕北羣阜獨朝東雲落碧霞殿花飛青帝宫還疑霄漢近颯颯御天風羊流店風流羊太傅故里至今存日暮思三徑天空問九原雲嶅開逺嶂汶水帶荒村父老談遺事林泉細討論蒙隂東䝉髙在望我欲采靈芝未得江心汲先憑石火炊名泉隨杖湧斜日下山遲且喜乗新爽春風已過期聞友人村居之樂勞車何日已羡爾寄青門桑柘栽千樹漁樵住一村情閒能狎鳥客到即開樽人事如流水山家總不論青駝寺津樹影婆娑離亭悲且歌人烟行處少山色路傍多倦馬渴奔水征車怯上坡夕陽明滅内古寺指青駝半城村夏霧野㝠㝠瑯琊枕北屏迎眸沂水白迴首魯山青老婦賣春繭貧農仗雨靈半城村市罷初地讀碑銘懷李青章公車北上北闕繞燕雲春風獨憶君離憂應共切言笑孰為羣天路鴻音逺山丘蘭氣芬去年相送處門外駐斜曛宿遷摇搖心靡定去去路將殘聲入黃河險情隨綠野寛鳩鳴初下樹魚活未離竿待趁風帆過波濤拂面寒自解入眼藤花落新詩不禁生登樓當有月聴鳥到無聲年少難摧折情多變老成舊遊知幾處昨夢石頭城初秋雜詠葡萄帶雨薦盤時事事驚心遊子悲一㸃螢光秋草外露濃飛不到書帷其二一劍空為道左留葛衣寒甚不經秋可憐驟雨狂風夜浪打湖干避亂舟其三薄薄雲衣淡淡明一蟬向晩獨留聲池邊綠葉隨風捲開盡蓮花秋水盈其四江干有警望飛援羽檄星馳馬足喧二六時辰鐘磬杳秪林反道是桃源其五凉風淅淅扇窮途雁未南征少帛書昨問故人家不逺輕帆兩日射陽湖其六聞鐘端不是聞笳静裏秋聲反憶家飯罷老僧相對坐蒲團移近鳯仙花其七漠漠一望渚田青禾耳叢生泛野萍自到秋來無好日滿天欲雨亂蜻蜒其八散盡珠璣輾轉貧新秋早起看垂綸為言姓字同泉石湖上閒鷗識老臣為劉阮仙前輩其九病骨逢秋影亦寒鬚眉常借水中看山僧雖樸能供客親摘園蔬佐曉餐其十薜蘿繞屋佛幢清幾日纔秋絡緯鳴不是書生空露坐代籌時事夜談兵其十一愁苦迎人便解詩禪窗翻覺夕陽遲秋風吹落梧相子小鳥銜來復上枝其十二烟火蕭然里巷空人家半借甓湖中凄凉促織喧秋夜織得愁絲幾萬叢抱犢山房集巻四
